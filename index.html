    :root {
      --ink: #edf1ef;
      --accent: #6d112d;
      --scope-bg: #07100c;
      --scope-grid: rgba(151, 180, 162, 0.16);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100svh;
    }

    body {
      display: grid;
      place-items: center;
      padding: 6px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.06), transparent 35%),
        linear-gradient(135deg, #0b0e0f, #14191a 55%, #0a0d0e);
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .console {
      position: relative;
      width: min(1180px, 98vw);
      height: min(96svh, 800px);
      min-height: 0;
      padding: 10px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.03)),
        linear-gradient(135deg, #b5c0bb 0%, #8a9792 20%, #65706d 48%, #4b5553 72%, #909c97 100%);
      box-shadow:
        0 28px 70px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -18px 40px rgba(0, 0, 0, 0.14);
    }

    .console::before,
    .console::after,
    .screw {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #d7ddd9, #86908c 42%, #394240 64%, #99a49f 78%, #4a5451);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.28),
        0 2px 4px rgba(0, 0, 0, 0.26);
    }

    .console::before { top: 11px; left: 11px; }
    .console::after { top: 11px; right: 11px; }
    .screw.bottom-left { left: 11px; bottom: 11px; }
    .screw.bottom-right { right: 11px; bottom: 11px; }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 38px;
      margin: 0 8px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    h1 {
      margin: 0;
      color: #f2f5f3;
      font-family: "Snowstorm Light", Inter, sans-serif;
      font-size: clamp(1.05rem, 1.7vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: 255px minmax(320px, 1fr) 255px;
      gap: 10px;
      height: calc(100% - 46px);
      min-height: 0;
    }

    .panel {
      min-height: 0;
      padding: 9px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        linear-gradient(135deg, rgba(202, 211, 207, 0.28), rgba(91, 102, 98, 0.26));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 -12px 28px rgba(0, 0, 0, 0.10);
    }

    .left-panel,
    .right-panel,
    .scope-panel {
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow: hidden;
    }

    .minimal-row {
      display: grid;
      gap: 7px;
    }

     .engage {
      min-height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 11px;
      cursor: pointer;
      color: #f4ecf0;
      font-family: "Snowstorm Light", Inter, sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.03)),
        linear-gradient(180deg, #8c223f, #561128);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 8px 14px rgba(0, 0, 0, 0.14);
    }

     .select,
    .small-select {
      width: 100%;
      min-height: 29px;
      padding: 0 10px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      outline: none;
      color: #eef2ef;
      font: 700 0.64rem/1 Inter, sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        linear-gradient(180deg, #202625, #101514);
    }

    .select option,
    .small-select option {
      color: #eef2ef;
      background: #111615;
    }

    .knob-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .knob-card,
    .lfo-card,
    .arp-card,
    .pitch-card {
      border-radius: 13px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        linear-gradient(135deg, rgba(185, 196, 191, 0.20), rgba(73, 84, 80, 0.24));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.10),
        inset 0 -10px 20px rgba(0, 0, 0, 0.08);
    }

    .knob-card {
      display: grid;
      place-items: center;
      min-height: 81px;
      padding: 4px 6px;
      gap: 3px;
    }

    .knob-label {
      color: #f0f3f2;
      font: 800 0.52rem/1 Inter, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .knob-value {
      min-height: 10px;
      color: #d0d8d4;
      font: 700 0.50rem/1 "SFMono-Regular", Consolas, monospace;
    }

    .knob {
      --rot: 0deg;
      --fill: 160deg;
      position: relative;
      width: 45px;
      height: 45px;
      border: none;
      border-radius: 50%;
      cursor: grab;
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.20), transparent 12%),
        radial-gradient(circle at 50% 52%, #4f5855, #2d3533 55%, #121716 68%, #606b67 73%, #202827 84%),
        conic-gradient(from -140deg, rgba(109, 17, 45, 0.94) 0deg var(--fill), rgba(255, 255, 255, 0.05) var(--fill) 280deg, transparent 280deg 360deg);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.08),
        inset 0 -10px 14px rgba(0, 0, 0, 0.58),
        0 7px 11px rgba(0, 0, 0, 0.25);
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 5px;
      width: 3px;
      height: 13px;
      transform: translateX(-50%) rotate(var(--rot));
      transform-origin: 50% 17px;
      border-radius: 999px;
      background: #eef2ef;
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.20);
    }

    .range {
      width: 100%;
      height: 4px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 999px;
      outline: none;
      background: linear-gradient(90deg, #61706b, #45504d);
    }

    .range::-webkit-slider-thumb {
      width: 10px;
      height: 10px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 50%;
      border: 1px solid #67736e;
      background: #dde5e1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

    .range::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid #67736e;
      background: #dde5e1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

     .scope-frame {
      position: relative;
      flex: 1;
      min-height: 0;
      padding: 10px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #020303;
      box-shadow:
        inset 0 0 28px rgba(0, 0, 0, 0.72),
        0 12px 22px rgba(0, 0, 0, 0.18);
      display: grid;
      place-items: center;
    }

    .life-cascade {
      position: absolute;
      inset: 10px;
      z-index: 0;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      display: block;
      border-radius: 16px;
      background: #000;
      image-rendering: pixelated;
      opacity: 1;
      mix-blend-mode: normal;
    }

    .diamond-connectors {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

     .scope-glass {
      position: relative;
      z-index: 1;
      width: min(100%, 560px);
      aspect-ratio: 1 / 1;
      max-width: 100%;
      max-height: 100%;
      overflow: hidden;
      border-radius: 0;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0 50%);
      background:
        radial-gradient(circle at 50% 45%, rgba(41, 96, 60, 0.20), transparent 55%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 16%),
        var(--scope-bg);
      box-shadow:
        inset 0 0 40px rgba(0, 0, 0, 0.88),
        inset 0 0 90px rgba(103, 255, 168, 0.05);
    }

    .scope-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(var(--scope-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--scope-grid) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #scope {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px rgba(109, 17, 45, 0.85));
    }

    .readouts {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: stretch;
    }

    .readout,
    .tiny-readout,
    .arp-readout {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 25px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: #f0f4f2;
      font: 800 0.52rem/1 "SFMono-Regular", Consolas, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        linear-gradient(180deg, #2f3735, #232928);
    }

    .color-button {
      min-width: 112px;
      padding: 0 16px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      font-family: "Snowstorm Light", "SFMono-Regular", Consolas, monospace;
      font-weight: 400;
      letter-spacing: 0.18em;
      border-color: rgba(212, 224, 218, 0.18);
      transition:
        filter 160ms ease,
        box-shadow 160ms ease,
        border-color 160ms ease,
        background 160ms ease;
    }

    .color-button:hover {
      filter: brightness(1.08);
      border-color: rgba(230, 240, 235, 0.30);
    }

    .color-button.is-active {
      color: #fff8fb;
      border-color: rgba(194, 78, 116, 0.42);
      background:
        radial-gradient(circle at 25% 18%, rgba(224, 236, 230, 0.12), transparent 38%),
        linear-gradient(135deg, #2e3b37 0%, #54132c 46%, #1b2624 100%);
      box-shadow:
        inset 0 0 14px rgba(255, 255, 255, 0.035),
        0 0 16px rgba(109, 17, 45, 0.32);
    }

    .lfo-stack {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 6px;
      height: 100%;
      min-height: 0;
    }

    .lfo-card {
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      min-height: 0;
      padding: 6px 7px;
      gap: 3px;
    }

    .pitch-card {
      display: grid;
      gap: 4px;
      padding: 7px;
    }

    .range-title {
      margin-top: 2px;
    }

    .pitch-scale {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      color: #d6deda;
      text-align: center;
      font: 700 0.42rem/1.2 Inter, sans-serif;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .lfo-title,
    .arp-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1px;
      color: #f0f4f2;
      font: 800 0.56rem/1 Inter, sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .lfo-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #d7dfdb;
      font: 700 0.50rem/1 Inter, sans-serif;
      letter-spacing: 0.08em;
    }

    .lfo-toggle input {
      width: 11px;
      height: 11px;
      accent-color: var(--accent);
    }

    .field {
      display: grid;
      gap: 2px;
    }

    .field label,
    .boost-row label {
      color: #d6deda;
      font: 800 0.48rem/1 Inter, sans-serif;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    .lfo-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .lfo-range-wrap {
      display: grid;
      gap: 2px;
      margin-top: 1px;
    }

    .dual-range {
      position: relative;
      height: 16px;
      margin-top: 1px;
    }

    .dual-range::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 4px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, #61706b, #45504d);
      opacity: 0.95;
    }

    .dual-range input[type="range"] {
      position: absolute;
      inset: 0;
      width: 100%;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      pointer-events: none;
    }

    .dual-range input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: transparent;
    }

    .dual-range input[type="range"]::-moz-range-track {
      height: 4px;
      background: transparent;
    }

    .dual-range input[type="range"]::-webkit-slider-thumb {
      pointer-events: auto;
      width: 10px;
      height: 10px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 50%;
      border: 1px solid #67736e;
      background: #dde5e1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      margin-top: -3px;
      position: relative;
      z-index: 2;
    }

    .dual-range input[type="range"]::-moz-range-thumb {
      pointer-events: auto;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid #67736e;
      background: #dde5e1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    .tiny-readout,
    .arp-readout {
      min-height: 22px;
      font-size: 0.50rem;
    }

    .lfo-scope-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
      padding-top: 1px;
    }

    .lfo-scope-frame {
      width: 66px;
      height: 66px;
      padding: 4px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(145deg, #96a29d, #44504d 28%, #262d2c 70%, #7d8984);
      box-shadow:
        inset 0 0 16px rgba(0, 0, 0, 0.46),
        0 6px 12px rgba(0, 0, 0, 0.12);
    }

    .lfo-scope-glass {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 45%, rgba(41, 96, 60, 0.20), transparent 55%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 16%),
        var(--scope-bg);
      box-shadow:
        inset 0 0 20px rgba(0, 0, 0, 0.88),
        inset 0 0 44px rgba(103, 255, 168, 0.05);
    }

    .lfo-scope {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 6px rgba(109, 17, 45, 0.80));
    }

    .arp-card {
      display: grid;
      gap: 5px;
      padding: 7px;
    }

    .arp-scale {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      color: #d6deda;
      text-align: center;
      font: 700 0.36rem/1.2 Inter, sans-serif;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .boost-row {
      display: grid;
      gap: 4px;
      padding-top: 1px;
    }

    @media (max-width: 1080px) {
      body {
        overflow: auto;
      }

      .console {
        height: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .scope-frame {
        min-height: 360px;
      }

      .scope-glass {
        width: min(100%, 420px);
      }

      .lfo-stack {
        grid-template-rows: auto;
      }

      .pitch-card {
        min-height: 74px;
      }

      .lfo-card {
        grid-template-rows: auto;
      }
    }

<body>
  <main class="console">
    <span class="screw bottom-left"></span>
    <span class="screw bottom-right"></span>

    <div class="topbar">
      <h1><span class="title-initial">G</span>UDECO MOSAIC LAB CONSOLE</h1>

    <section class="layout">

          <div class="knob-card">

          <div class="knob-card">
            <div class="knob-label">Repeats</div>
            <button class="knob" type="button" data-for="repeats"></button>
            <input class="range" id="repeats" type="range" min="0" max="1" step="0.01" value="0.48">
            <div class="knob-value" id="repeatsValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Jitter</div>
            <button class="knob" type="button" data-for="jitter"></button>
            <input class="range" id="jitter" type="range" min="0" max="1" step="0.01" value="0.18">
            <div class="knob-value" id="jitterValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Filter</div>

            <input class="range" id="filter" type="range" min="700" max="12500" step="1" value="5200">

          <div class="knob-card">

      <aside class="panel right-panel">

            <div class="field">

            <div class="field lfo-range-wrap">

            <div class="lfo-scope-wrap">

                  <canvas class="lfo-scope" id="lfo1Scope"></canvas>

              </div>
            </div>
          </div>

          <div class="pitch-card">

              <span>1</span>
              <span>2</span>
            </div>

              <span>Range</span>
              <div class="arp-readout" id="rangeValue">2 Oct Up</div>
            </div>

            <div class="pitch-scale">
              <span>-2</span>
              <span>-1</span>
              <span>0</span>
              <span>1</span>
              <span>2</span>
            </div>
          </div>

          <div class="lfo-card">
            <div class="lfo-title">
              <span>LFO 2</span>
              <input type="checkbox" id="lfo2Enable" checked hidden>

            <div class="field">

            </div>

                <option value="sine">Sine</option>
                <option value="triangle">Triangle</option>
                <option value="square">Square</option>
                <option value="random">Random</option>
              </select>
            </div>

            <div class="lfo-pair">
              <div class="field">

              </div>

  </main>

  <script>
    const ui = {
      startButton: document.getElementById("startButton"),
      micSelect: document.getElementById("micSelect"),

      lfo2Enable: document.getElementById("lfo2Enable"),
      lfo2Target: document.getElementById("lfo2Target"),
      lfo2Wave: document.getElementById("lfo2Wave"),
      lfo2Rate: document.getElementById("lfo2Rate"),
      lfo2Depth: document.getElementById("lfo2Depth"),

      lfo2RateValue: document.getElementById("lfo2RateValue"),
      lfo2DepthValue: document.getElementById("lfo2DepthValue"),
      lfo2RangeValue: document.getElementById("lfo2RangeValue"),
      lfo2Scope: document.getElementById("lfo2Scope")
    };

    const arpModes = [
      { name: "Off", intervals: [12] },
      { name: "Major", intervals: [4, 7, 12, 16, 19, 24] },
      { name: "Minor", intervals: [3, 7, 12, 15, 19, 24] },
      { name: "Diminished", intervals: [3, 6, 9, 12, 15, 18] },
      { name: "Augmented", intervals: [4, 8, 12, 16, 20, 24] },
      { name: "Sus4", intervals: [5, 7, 12, 17, 19, 24] },
      { name: "Dominant 7", intervals: [4, 7, 10, 12, 16, 19, 22] }
    ];

    const controlDefs = {
      activity: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      time: { min: 60, max: 820, format: v => `${Math.round(v)} ms`, knob: true },
      repeats: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      jitter: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      filter: { min: 700, max: 12500, format: v => `${Math.round(v)} Hz`, knob: true },
      reverb: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      wet: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      dry: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      arpMode: { min: 0, max: 6, format: v => arpModes[Math.round(v)]?.name || "Off", stepped: true },
      wetBoost: { min: 1, max: 8, format: v => `${v.toFixed(1)}x` },
      phase: { min: 0, max: 1, format: v => `${Math.round(v * MAX_PHASE_DELAY_MS)} ms` },
      pitch: {
        min: -2,
        max: 2,
        stepped: true,
        format: v => {
          const pitchLabels = {
            "-2": "2 Oct Down",
            "-1": "Inverse",
            "0": "Simple",
            "1": "Mode",
            "2": "Mode + Oct"
          };

          return pitchLabels[String(Math.round(v))] || "Mode";
        }
      },
      range: {
        min: -2,
        max: 2,
        stepped: true,
        format: v => {
          const rangeLabels = {
            "-2": "2 Oct Down",
            "-1": "1 Oct Down",
            "0": "No Extra",
            "1": "1 Oct Up",
            "2": "2 Oct Up"
          };

          return rangeLabels[String(Math.round(v))] || "No Extra";
        }
      }
    };

    const knobIds = Object.keys(controlDefs).filter(id => controlDefs[id].knob);

    const targetOptions = [
      ["none", "None"],
      ["activity", "Activity"],
      ["time", "Time"],
      ["repeats", "Repeats"],
      ["jitter", "Jitter"],
      ["filter", "Filter"],
      ["reverb", "Reverb"],
      ["wet", "Wet"],
      ["dry", "Dry"],
      ["arpMode", "Arpeggio"],
      ["pitch", "Pitch"],
      ["range", "Range"],
      ["wetBoost", "Wet Boost"],
      ["phase", "Phase"]
    ];

    const manualValues = {};
    const visualValues = {};

    const engine = {
      context: null,
      stream: null,
      source: null,
      processor: null,
      leftAnalyser: null,
      rightAnalyser: null,
      rightDelay: null,
      filter: null,
      wetGain: null,
      dryGain: null,
      reverbInput: null,
      processedBus: null,
      masterGain: null,
      compressor: null,
      currentParams: null,
      arpMode: 0,
      pitchMode: 1,
      rangeMode: 0,
      colorMode: false,
      colorWashL: 0,
      colorWashR: 0,
      colorPulse: 0,

      bufferLength: 0,
      left: null,
      right: null,
      writeIndex: 0,
      voices: [],
      spawnCountdown: 0,
      inputPeak: 0,
      active: false
    };

    const lfoRuntime = {
      lfo1: { phase: 0, lastCycle: -1, held: 0, current: 0 },
      lfo2: { phase: 0, lastCycle: -1, held: 0, current: 0 }
    };

    const lifeCascade = {
      cols: 96,
      rows: 96,
      cells: new Uint8Array(96 * 96),
      next: new Uint8Array(96 * 96),
      tileCanvas: document.createElement("canvas"),
      tileCtx: null,
      accumulator: 0,
      scroll: 0,
      lastRuleKey: "",
      lastCellSize: 0,
      seed: 1
    };

    lifeCascade.tileCtx = lifeCascade.tileCanvas.getContext("2d", { alpha: false });

    let lastFrameTime = performance.now();

    const MAX_PHASE_DELAY_MS = 250;


    const lifeColorPalette = [
      { bg: [1, 5, 4],      pixel: [237, 244, 239], glow: [77, 121, 101] },
      { bg: [4, 14, 18],     pixel: [223, 241, 234], glow: [80, 132, 142] },
      { bg: [18, 12, 30],    pixel: [239, 231, 246], glow: [126, 94, 148] },
      { bg: [35, 8, 20],     pixel: [250, 229, 237], glow: [164, 45, 89] },
      { bg: [10, 24, 18],    pixel: [234, 244, 231], glow: [102, 146, 111] }
    ];

    function mixChannel(a, b, t) {
      return Math.round(a + (b - a) * t);
    }

    function rgbString(rgb, alpha = 1) {
      return `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
    }

    function mixRgb(a, b, t) {
      return [
        mixChannel(a[0], b[0], t),
        mixChannel(a[1], b[1], t),
        mixChannel(a[2], b[2], t)
      ];
    }

    function getLifeColorTheme() {
      if (!engine.colorMode) {
        return {
          bg: "#000",
          pixel: "rgba(255, 255, 255, 0.84)",
          pixelSoft: "rgba(255, 255, 255, 0.34)",
          vignette: "rgba(0, 0, 0, 0.42)",
          glow: "rgba(109, 17, 45, 0.00)"
        };
      }

      const t = performance.now() * 0.000095;
      const scaled = t * lifeColorPalette.length;
      const i0 = Math.floor(scaled) % lifeColorPalette.length;
      const i1 = (i0 + 1) % lifeColorPalette.length;
      const frac = scaled - Math.floor(scaled);
      const ease = frac * frac * (3 - 2 * frac);

      const bg = mixRgb(lifeColorPalette[i0].bg, lifeColorPalette[i1].bg, ease);
      const pixel = mixRgb(lifeColorPalette[i0].pixel, lifeColorPalette[i1].pixel, ease);
      const glow = mixRgb(lifeColorPalette[i0].glow, lifeColorPalette[i1].glow, ease);

      return {
        bg: rgbString(bg, 1),
        pixel: rgbString(pixel, 0.88),
        pixelSoft: rgbString(glow, 0.26),
        vignette: "rgba(0, 0, 0, 0.32)",
        glow: rgbString(glow, 0.18)
      };
    }

    function setColorMode(active) {
      engine.colorMode = !!active;
      engine.colorPulse = performance.now();
      engine.colorWashL = 0;
      engine.colorWashR = 0;

      if (ui.colorButton) {
        ui.colorButton.classList.toggle("is-active", engine.colorMode);
        ui.colorButton.setAttribute("aria-pressed", String(engine.colorMode));
      }

      // Force the cellular field to reseed subtly when the color/sound mode changes.
      lifeCascade.lastRuleKey = "";
      setStatus(engine.colorMode ? "Color mode" : (engine.active ? "Audio running" : "Stopped"));
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function semitonesToRate(semitones) {
      return Math.pow(2, semitones / 12);
    }

    function shapeIntervalByPitch(baseInterval) {
      const pitchMode = Math.round(engine.pitchMode ?? 1);

      if (pitchMode === 0) return 0;
      if (pitchMode === 1) return baseInterval;
      if (pitchMode === 2) return baseInterval + 12;
      if (pitchMode === -1) return -baseInterval;
      if (pitchMode === -2) return baseInterval - 24;

      return baseInterval;
    }

    function getRangeOffsets() {
      const rangeMode = Math.round(engine.rangeMode ?? 0);

      if (rangeMode === 0) return [0];

      const direction = rangeMode > 0 ? 1 : -1;
      const octaves = Math.abs(rangeMode);
      const offsets = [];

      for (let i = 0; i <= octaves; i++) {
        offsets.push(i * 12 * direction);
      }

      return offsets;
    }

    function getArpPool(modeIndex) {
      if (Math.round(engine.pitchMode ?? 1) === 0) return [0];

      const mode = arpModes[modeIndex] || arpModes[0];
      const rangeOffsets = getRangeOffsets();
      const intervals = new Set();

      mode.intervals.forEach(baseInterval => {
        const shaped = shapeIntervalByPitch(baseInterval);

        rangeOffsets.forEach(offset => {
          intervals.add(shaped + offset);
        });
      });

      return Array.from(intervals);
    }

    function getRandomArpInterval(modeIndex, previousInterval = null) {
      const pool = getArpPool(modeIndex);

      if (!pool.length) return 0;

      let candidates = pool;

      if (pool.length > 1 && previousInterval !== null) {
        const filtered = pool.filter(interval => interval !== previousInterval);
        if (filtered.length) candidates = filtered;
      }

      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function setStatus(text) {
      ui.startButton.title = text;
    }

    function populateTargetSelects() {
      [ui.lfo1Target, ui.lfo2Target].forEach(select => {
        select.innerHTML = "";

        targetOptions.forEach(([value, label]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = label;
          select.appendChild(option);
        });
      });
    }

    function syncManualValues() {
      Object.keys(controlDefs).forEach(id => {
        manualValues[id] = Number(ui[id].value);
        visualValues[id] = manualValues[id];
      });
    }

    function setKnobVisual(id, value, moveSlider = true) {
      const def = controlDefs[id];
      const knob = document.querySelector(`.knob[data-for="${id}"]`);
      const valueLabel = document.getElementById(`${id}Value`);
      const pct = clamp((value - def.min) / (def.max - def.min), 0, 1);
      const deg = -135 + pct * 270;

      if (knob) {
        knob.style.setProperty("--rot", `${deg}deg`);
        knob.style.setProperty("--fill", `${pct * 280}deg`);
      }

      if (valueLabel) {
        valueLabel.textContent = def.format(value);
      }

      if (moveSlider && ui[id]) {
        ui[id].value = value;
      }

      visualValues[id] = value;
    }

    function setControlVisual(id, value, moveSlider = true) {
      const def = controlDefs[id];
      let v = clamp(value, def.min, def.max);

      if (def.stepped) {
        v = Math.round(v);
      }

      if (def.knob) {
        setKnobVisual(id, v, moveSlider);
        return;
      }

      if (id === "arpMode") {
        if (moveSlider) ui.arpMode.value = v;
        ui.arpModeValue.textContent = def.format(v);
        visualValues[id] = v;
        return;
      }

      if (id === "wetBoost") {
        if (moveSlider) ui.wetBoost.value = v;
        ui.wetBoostValue.textContent = def.format(v);
        visualValues[id] = v;
        return;
      }

      if (id === "phase") {
        if (moveSlider) ui.phase.value = v;
        ui.phaseValue.textContent = def.format(v);
        visualValues[id] = v;
        return;
      }

      if (id === "pitch") {
        if (moveSlider) ui.pitch.value = v;
        ui.pitchValue.textContent = def.format(v);
        visualValues[id] = v;
        return;
      }

      if (id === "range") {
        if (moveSlider) ui.range.value = v;
        ui.rangeValue.textContent = def.format(v);
        visualValues[id] = v;
      }
    }

    function updateAllControlVisuals(valuesObj, moveSliders = true) {
      Object.keys(controlDefs).forEach(id => {
        setControlVisual(id, valuesObj[id], moveSliders);
      });
    }

    function updateLfoLabels() {
      ui.lfo1RateValue.textContent = `${Number(ui.lfo1Rate.value).toFixed(2)} Hz`;
      ui.lfo1DepthValue.textContent = `${Math.round(Number(ui.lfo1Depth.value) * 100)}%`;

      const lfo1Min = Math.min(Number(ui.lfo1Min.value), Number(ui.lfo1Max.value));
      const lfo1Max = Math.max(Number(ui.lfo1Min.value), Number(ui.lfo1Max.value));
      ui.lfo1RangeValue.textContent = `${Math.round(lfo1Min * 100)}% – ${Math.round(lfo1Max * 100)}%`;

      ui.lfo2RateValue.textContent = `${Number(ui.lfo2Rate.value).toFixed(2)} Hz`;
      ui.lfo2DepthValue.textContent = `${Math.round(Number(ui.lfo2Depth.value) * 100)}%`;

      const lfo2Min = Math.min(Number(ui.lfo2Min.value), Number(ui.lfo2Max.value));
      const lfo2Max = Math.max(Number(ui.lfo2Min.value), Number(ui.lfo2Max.value));
      ui.lfo2RangeValue.textContent = `${Math.round(lfo2Min * 100)}% – ${Math.round(lfo2Max * 100)}%`;
    }

    function getLfoConfig(index) {
      const min = Number(ui[`lfo${index}Min`].value);
      const max = Number(ui[`lfo${index}Max`].value);

      return {
        enabled: ui[`lfo${index}Enable`].checked,
        target: ui[`lfo${index}Target`].value,
        wave: ui[`lfo${index}Wave`].value,
        rate: Number(ui[`lfo${index}Rate`].value),
        depth: Number(ui[`lfo${index}Depth`].value),
        min: Math.min(min, max),
        max: Math.max(min, max)
      };
    }

    function evalLfo(name, config, dt) {
      const rt = lfoRuntime[name];

      rt.phase += dt * config.rate * Math.PI * 2;

      if (rt.phase > Math.PI * 2000) {
        rt.phase = rt.phase % (Math.PI * 2);
      }

      const cycle = Math.floor(rt.phase / (Math.PI * 2));

      if (config.wave === "random") {
        if (cycle !== rt.lastCycle) {
          rt.held = Math.random() * 2 - 1;
          rt.lastCycle = cycle;
        }

        rt.current = rt.held;
        return rt.current;
      }

      const s = Math.sin(rt.phase);

      if (config.wave === "sine") rt.current = s;
      else if (config.wave === "triangle") rt.current = (2 / Math.PI) * Math.asin(s);
      else if (config.wave === "square") rt.current = s >= 0 ? 1 : -1;
      else rt.current = s;

      return rt.current;
    }

    function computeEffectiveControls(dt) {
      const effective = { ...manualValues };

      [1, 2].forEach(index => {
        const cfg = getLfoConfig(index);
        const name = `lfo${index}`;
        const wave = evalLfo(name, cfg, dt);

        if (!cfg.enabled || cfg.target === "none" || !controlDefs[cfg.target]) return;

        const def = controlDefs[cfg.target];
        const span = def.max - def.min;

        /*
          LFO range mapping:
          - min/max define the modulation window as percentages of the target span.
          - depth blends between the manual value and the value produced inside that window.
        */
        const normalizedWave = (wave + 1) / 2;
        const minValue = def.min + cfg.min * span;
        const maxValue = def.min + cfg.max * span;
        const rangedValue = minValue + normalizedWave * (maxValue - minValue);

        effective[cfg.target] = effective[cfg.target] +
          (rangedValue - effective[cfg.target]) * cfg.depth;
      });

      Object.keys(controlDefs).forEach(id => {
        const def = controlDefs[id];

        effective[id] = clamp(effective[id], def.min, def.max);

        if (def.stepped) {
          effective[id] = Math.round(effective[id]);
        }
      });

      return effective;
    }

    function extractAudioParams(controls) {
      const params = {};
      knobIds.forEach(id => {
        params[id] = controls[id];
      });
      return params;
    }

    function applyAudioParams(params, controls) {
      if (!engine.context) return;

      const now = engine.context.currentTime;
      const color = engine.colorMode ? 1 : 0;

      if (engine.filter) {
        const sweetFilter = Math.min(controlDefs.filter.max, params.filter * (1 + color * 0.10) + color * 1400);
        engine.filter.frequency.setTargetAtTime(sweetFilter, now, 0.03);

        if (engine.filter.Q) {
          engine.filter.Q.setTargetAtTime(0.62 + color * (0.48 + controls.reverb * 0.42), now, 0.05);
        }
      }

      if (engine.wetGain) {
        const wetGain = clamp(params.wet * (1 + color * 0.22) + color * 0.08, 0, 1.35);
        engine.wetGain.gain.setTargetAtTime(wetGain, now, 0.025);
      }

      if (engine.dryGain) {
        const dryGain = clamp(params.dry * (1 - color * 0.18), 0, 1);
        engine.dryGain.gain.setTargetAtTime(dryGain, now, 0.03);
      }

      if (engine.reverbInput) {
        const reverbGain = clamp(params.reverb * (0.65 + color * 0.30) + color * 0.16, 0, 1.35);
        engine.reverbInput.gain.setTargetAtTime(reverbGain, now, 0.05);
      }

      if (engine.processedBus) {
        const busGain = (0.92 + color * 0.20) * controls.wetBoost;
        engine.processedBus.gain.setTargetAtTime(busGain, now, 0.03);
      }

      if (engine.masterGain) {
        engine.masterGain.gain.setTargetAtTime(engine.colorMode ? 0.78 : 0.84, now, 0.05);
      }

      if (engine.compressor) {
        engine.compressor.threshold.setTargetAtTime(engine.colorMode ? -26 : -18, now, 0.08);
        engine.compressor.knee.setTargetAtTime(engine.colorMode ? 22 : 14, now, 0.08);
        engine.compressor.ratio.setTargetAtTime(engine.colorMode ? 3.2 : 2.0, now, 0.08);
        engine.compressor.release.setTargetAtTime(engine.colorMode ? 0.42 : 0.20, now, 0.08);
      }

      if (engine.rightDelay) {
        const delaySeconds = controls.phase * MAX_PHASE_DELAY_MS / 1000;
        engine.rightDelay.delayTime.setTargetAtTime(delaySeconds, now, 0.02);
      }
    }

    function makeImpulse(context, seconds = 2.2, decay = 4.2) {
      const length = Math.floor(context.sampleRate * seconds);
      const impulse = context.createBuffer(2, length, context.sampleRate);

      for (let c = 0; c < 2; c++) {
        const data = impulse.getChannelData(c);

        for (let i = 0; i < length; i++) {
          const t = i / length;
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
        }
      }

      return impulse;
    }

    function setupMosaicMemory(sampleRate) {
      engine.bufferLength = Math.floor(sampleRate * 8);
      engine.left = new Float32Array(engine.bufferLength);
      engine.right = new Float32Array(engine.bufferLength);
      engine.writeIndex = 0;
      engine.voices = [];
      engine.spawnCountdown = 0;
      engine.colorWashL = 0;
      engine.colorWashR = 0;
    }

    function spawnVoice(sampleRate) {
      const p = engine.currentParams || extractAudioParams(manualValues);
      const activity = clamp(p.activity, 0, 1);
      const color = engine.colorMode ? 1 : 0;
      const loopBase = Math.max(24, Math.floor(sampleRate * p.time / 1000));
      const jitter = clamp(p.jitter, 0, 1);

      const lengthJitter = 1 + (Math.random() * 2 - 1) * jitter * (0.42 - color * 0.12);
      const loopLength = Math.max(32, Math.floor(loopBase * lengthJitter));
      const maxLookback = loopLength * (1.1 + jitter * (2.6 + color * 1.2));
      const offset = Math.floor(loopLength + Math.random() * maxLookback);
      const start = (engine.writeIndex - offset + engine.bufferLength) % engine.bufferLength;

      let interval = getRandomArpInterval(engine.arpMode);

      if (engine.colorMode && Math.random() < 0.26) {
        interval += Math.random() < 0.70 ? 12 : 7;
      }

      const pan = Math.random() * 2 - 1;
      const amp = engine.colorMode ? (0.26 + Math.random() * 0.17) : (0.42 + Math.random() * 0.25);
      const cycles = engine.colorMode ? (2.25 + p.repeats * 10.5) : (1.5 + p.repeats * 8.5);
      const life = Math.floor((loopLength / 2) * cycles);

      engine.voices.push({
        start,
        pos: 0,
        length: loopLength,
        age: 0,
        life,
        pan,
        amp,
        repeatIndex: 0,
        interval,
        rate: semitonesToRate(interval),
        colorPhase: Math.random() * Math.PI * 2,
        colorDepth: engine.colorMode ? (0.30 + Math.random() * 0.70) : 0,
        drift: engine.colorMode ? ((Math.random() * 2 - 1) * 0.0024) : 0
      });
    }

    function readCircular(buffer, position) {
      const wrapped = ((position % engine.bufferLength) + engine.bufferLength) % engine.bufferLength;
      const i0 = Math.floor(wrapped);
      const i1 = (i0 + 1) % engine.bufferLength;
      const frac = wrapped - Math.floor(wrapped);

      return buffer[i0] * (1 - frac) + buffer[i1] * frac;
    }

    function processMosaic(event) {
      const inputBuffer = event.inputBuffer;
      const outputBuffer = event.outputBuffer;

      const inputL = inputBuffer.getChannelData(0);
      const inputR = inputBuffer.numberOfChannels > 1 ? inputBuffer.getChannelData(1) : inputL;

      const outputL = outputBuffer.getChannelData(0);
      const outputR = outputBuffer.numberOfChannels > 1 ? outputBuffer.getChannelData(1) : outputL;

      const sampleRate = engine.context.sampleRate;
      const p = engine.currentParams || extractAudioParams(manualValues);
      const color = engine.colorMode ? 1 : 0;

      const activity = clamp(p.activity, 0, 1);
      const loopSamples = Math.max(24, Math.floor(sampleRate * p.time / 1000));
      const maxVoices = (color ? 8 : 2) + Math.floor(activity * (color ? 24 : 18));
      const spawnInterval = Math.max(color ? 12 : 20, Math.floor(loopSamples * ((color ? 1.38 : 1.75) - activity * (color ? 1.08 : 1.42))));

      let peak = 0;

      for (let i = 0; i < outputL.length; i++) {
        const dryL = inputL[i] || 0;
        const dryR = inputR[i] || dryL;

        peak = Math.max(peak, Math.abs(dryL), Math.abs(dryR));

        engine.left[engine.writeIndex] = dryL;
        engine.right[engine.writeIndex] = dryR;

        engine.spawnCountdown--;

        if (engine.spawnCountdown <= 0) {
          const spawnChance = color ? (0.82 + activity * 0.15) : (0.68 + activity * 0.28);

          if (engine.voices.length < maxVoices && Math.random() < spawnChance) {
            spawnVoice(sampleRate);
          }

          engine.spawnCountdown = Math.floor(spawnInterval * ((color ? 0.58 : 0.68) + Math.random() * (color ? 0.62 : 0.72)));
        }

        let wetL = 0;
        let wetR = 0;
        const survivors = [];

        for (const voice of engine.voices) {
          const position = (voice.start + voice.pos) % engine.bufferLength;
          let sampleL = readCircular(engine.left, position);
          let sampleR = readCircular(engine.right, position);

          if (color) {
            const shimmer = Math.sin(voice.age * 0.0047 + voice.colorPhase);
            const swirl = Math.cos(voice.age * 0.0031 + voice.colorPhase * 1.37);
            const offsetA = shimmer * voice.colorDepth * 42;
            const offsetB = swirl * voice.colorDepth * 86;
            const tapL = readCircular(engine.left, position + offsetA);
            const tapR = readCircular(engine.right, position - offsetA);
            const airL = readCircular(engine.left, position + offsetB);
            const airR = readCircular(engine.right, position - offsetB);

            sampleL = sampleL * 0.60 + tapL * 0.25 + airR * 0.15;
            sampleR = sampleR * 0.60 + tapR * 0.25 + airL * 0.15;
          }

          const attack = Math.min(color ? 960 : 384, voice.life * (color ? 0.18 : 0.12));
          const releaseStart = voice.life * (color ? 0.62 : 0.72);

          let env = 1;

          if (voice.age < attack) {
            env = voice.age / Math.max(1, attack);
          }

          if (voice.age > releaseStart) {
            env *= Math.max(
              0,
              1 - (voice.age - releaseStart) / Math.max(1, voice.life - releaseStart)
            );
          }

          const panL = Math.cos((voice.pan + 1) * Math.PI / 4);
          const panR = Math.sin((voice.pan + 1) * Math.PI / 4);
          const level = voice.amp * env * (color ? 0.86 : 1);

          if (color) {
            wetL += (sampleL * 0.66 + sampleR * 0.34) * level * panL;
            wetR += (sampleR * 0.66 + sampleL * 0.34) * level * panR;
          } else {
            wetL += (sampleL * 0.82 + sampleR * 0.18) * level * panL;
            wetR += (sampleR * 0.82 + sampleL * 0.18) * level * panR;
          }

          voice.pos += voice.rate * (1 + color * (voice.drift + Math.sin(voice.age * 0.002 + voice.colorPhase) * 0.0016));

          while (voice.pos >= voice.length) {
            voice.pos -= voice.length;
            voice.repeatIndex++;
            voice.interval = getRandomArpInterval(engine.arpMode, voice.interval);
            voice.rate = semitonesToRate(voice.interval);
          }

          voice.age++;

          if (voice.age < voice.life) {
            survivors.push(voice);
          }
        }

        engine.voices = survivors;

        if (color) {
          engine.colorWashL = engine.colorWashL * 0.992 + wetL * 0.008;
          engine.colorWashR = engine.colorWashR * 0.992 + wetR * 0.008;
          wetL += engine.colorWashR * 0.42;
          wetR += engine.colorWashL * 0.42;
        }

        const normalize = 1 / Math.sqrt(Math.max(1, engine.voices.length * (color ? 0.92 : 0.75)));
        const drive = color ? 1.14 : 1.55;

        outputL[i] = Math.tanh(wetL * normalize * drive);
        outputR[i] = Math.tanh(wetR * normalize * drive);

        engine.writeIndex = (engine.writeIndex + 1) % engine.bufferLength;
      }

      engine.inputPeak = peak;
      ui.readInput.textContent = `Input ${String(Math.round(peak * 100)).padStart(3, "0")}%`;
      ui.readVoices.textContent = `Voices ${String(engine.voices.length).padStart(2, "0")}`;
    }

    async function populateMicrophones() {
      if (!navigator.mediaDevices?.enumerateDevices) return;

      const devices = await navigator.mediaDevices.enumerateDevices();
      const inputs = devices.filter(d => d.kind === "audioinput");
      const current = ui.micSelect.value;

      ui.micSelect.innerHTML = `<option value="">Default microphone</option>`;

      inputs.forEach((device, index) => {
        const opt = document.createElement("option");
        opt.value = device.deviceId;
        opt.textContent = device.label || `Microphone ${index + 1}`;
        ui.micSelect.appendChild(opt);
      });

      if (current) {
        ui.micSelect.value = current;
      }
    }

    function getAudioConstraints() {
      const deviceId = ui.micSelect.value;

      const base = {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      };

      if (deviceId) {
        return { audio: { ...base, deviceId: { exact: deviceId } } };
      }

      return { audio: base };
    }

    async function stopAudio() {
      if (engine.stream) {
        engine.stream.getTracks().forEach(track => track.stop());
      }

      if (engine.processor) engine.processor.disconnect();
      if (engine.source) engine.source.disconnect();
      if (engine.context) await engine.context.close();

      engine.context = null;
      engine.stream = null;
      engine.source = null;
      engine.processor = null;
      engine.leftAnalyser = null;
      engine.rightAnalyser = null;
      engine.rightDelay = null;
      engine.filter = null;
      engine.wetGain = null;
      engine.dryGain = null;
      engine.reverbInput = null;
      engine.processedBus = null;
      engine.masterGain = null;
      engine.compressor = null;
      engine.active = false;

      ui.startButton.textContent = "Input";
      setStatus("Stopped");
      ui.readInput.textContent = "Input 000%";
      ui.readVoices.textContent = "Voices 00";
    }

    async function startAudio() {
      if (engine.active) {
        await stopAudio();
        return;
      }

      try {
        setStatus("Requesting microphone");

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error("Microphone access is not available here");
        }

        if (!AudioContextClass) {
          throw new Error("Web Audio is not supported");
        }

        const context = new AudioContextClass({ latencyHint: "interactive" });

        if (context.state === "suspended") {
          await context.resume();
        }

        const stream = await navigator.mediaDevices.getUserMedia(getAudioConstraints());
        await populateMicrophones();

        const source = context.createMediaStreamSource(stream);
        const processor = context.createScriptProcessor(1024, 2, 2);
        processor.onaudioprocess = processMosaic;

        setupMosaicMemory(context.sampleRate);

        const filter = context.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = manualValues.filter;
        filter.Q.value = 0.62;

        const wetGain = context.createGain();
        wetGain.gain.value = manualValues.wet;

        const dryGain = context.createGain();
        dryGain.gain.value = manualValues.dry;

        const reverbInput = context.createGain();
        reverbInput.gain.value = manualValues.reverb * 0.65;

        const convolver = context.createConvolver();
        convolver.buffer = makeImpulse(context);

        const reverbReturn = context.createGain();
        reverbReturn.gain.value = 0.72;

        const processedBus = context.createGain();
        processedBus.gain.value = 0.92 * manualValues.wetBoost;

        const masterGain = context.createGain();
        masterGain.gain.value = engine.colorMode ? 0.78 : 0.84;

        const compressor = context.createDynamicsCompressor();
        compressor.threshold.value = engine.colorMode ? -26 : -18;
        compressor.knee.value = engine.colorMode ? 22 : 14;
        compressor.ratio.value = engine.colorMode ? 3.2 : 2.0;
        compressor.attack.value = 0.006;
        compressor.release.value = engine.colorMode ? 0.42 : 0.20;

        const phaseInput = context.createGain();
        phaseInput.channelCount = 2;
        phaseInput.channelCountMode = "explicit";
        phaseInput.channelInterpretation = "speakers";

        const phaseSplitter = context.createChannelSplitter(2);
        const leftPhaseGain = context.createGain();
        const rightDelay = context.createDelay(MAX_PHASE_DELAY_MS / 1000);
        rightDelay.delayTime.value = (manualValues.phase || 0) * MAX_PHASE_DELAY_MS / 1000;

        const phaseMerger = context.createChannelMerger(2);

        const leftAnalyser = context.createAnalyser();
        leftAnalyser.fftSize = 2048;
        leftAnalyser.smoothingTimeConstant = 0.72;

        const rightAnalyser = context.createAnalyser();
        rightAnalyser.fftSize = 2048;
        rightAnalyser.smoothingTimeConstant = 0.72;

        source.connect(processor);
        processor.connect(wetGain);
        wetGain.connect(filter);

        filter.connect(processedBus);
        filter.connect(reverbInput);

        reverbInput.connect(convolver);
        convolver.connect(reverbReturn);
        reverbReturn.connect(processedBus);

        processedBus.connect(phaseInput);

        source.connect(dryGain);
        dryGain.connect(phaseInput);

        phaseInput.connect(phaseSplitter);
        phaseSplitter.connect(leftPhaseGain, 0);
        phaseSplitter.connect(rightDelay, 1);

        leftPhaseGain.connect(leftAnalyser);
        rightDelay.connect(rightAnalyser);

        leftPhaseGain.connect(phaseMerger, 0, 0);
        rightDelay.connect(phaseMerger, 0, 1);

        phaseMerger.connect(compressor);
        compressor.connect(masterGain);
        masterGain.connect(context.destination);

        engine.context = context;
        engine.stream = stream;
        engine.source = source;
        engine.processor = processor;
        engine.leftAnalyser = leftAnalyser;
        engine.rightAnalyser = rightAnalyser;
        engine.rightDelay = rightDelay;
        engine.filter = filter;
        engine.wetGain = wetGain;
        engine.dryGain = dryGain;
        engine.reverbInput = reverbInput;
        engine.processedBus = processedBus;
        engine.masterGain = masterGain;
        engine.compressor = compressor;
        engine.active = true;

        ui.startButton.textContent = "Stop";
        setStatus("Audio running");
      } catch (error) {
        console.error(error);
        ui.startButton.textContent = "Input Error";
        setStatus(`Error: ${error.message}`);
      }
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * dpr));
      const height = Math.max(1, Math.floor(rect.height * dpr));

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      return { width, height };
    }

    function lifeHash(x, y, seed) {
      let n = (x * 374761393 + y * 668265263 + seed * 1442695041) | 0;
      n = (n ^ (n >>> 13)) | 0;
      n = Math.imul(n, 1274126177);
      n = (n ^ (n >>> 16)) >>> 0;

      return n / 4294967295;
    }

    function getLifeRuleControls(source = visualValues) {
      return {
        activity: source.activity ?? manualValues.activity ?? 0.62,
        repeats: source.repeats ?? manualValues.repeats ?? 0.48,
        jitter: source.jitter ?? manualValues.jitter ?? 0.18,
        filter: source.filter ?? manualValues.filter ?? 5200,
        reverb: source.reverb ?? manualValues.reverb ?? 0.22,
        wet: source.wet ?? manualValues.wet ?? 0.72,
        dry: source.dry ?? manualValues.dry ?? 0.12,
        arpMode: source.arpMode ?? manualValues.arpMode ?? 0,
        pitch: source.pitch ?? manualValues.pitch ?? 1,
        range: source.range ?? manualValues.range ?? 0
      };
    }

    function getLifeRuleSet(source = visualValues) {
      const c = getLifeRuleControls(source);

      const birth = new Set([3]);
      const survive = new Set([2, 3]);

      if (c.jitter > 0.38) birth.add(6);
      if (c.activity > 0.76) birth.add(4);
      if (c.repeats > 0.62) survive.add(4);
      if (c.reverb > 0.58) survive.add(5);
      if (c.dry > 0.42) survive.delete(2);
      if (c.wet > 0.72) birth.add(2);

      return { birth, survive };
    }

    function getLifeRuleKey(source = visualValues) {
      const c = getLifeRuleControls(source);
      const filterBand = Math.round((c.filter - controlDefs.filter.min) / (controlDefs.filter.max - controlDefs.filter.min) * 5);

      return [
        Math.round(c.activity * 5),
        Math.round(c.repeats * 5),
        Math.round(c.jitter * 5),
        filterBand,
        Math.round(c.reverb * 5),
        Math.round(c.wet * 5),
        Math.round(c.dry * 5),
        Math.round(c.arpMode),
        Math.round(c.pitch),
        Math.round(c.range)
      ].join(":");
    }

    function seedLifeCascade(ruleKey, source = visualValues) {
      const c = getLifeRuleControls(source);
      const density = 0.07 + c.activity * 0.12 + c.repeats * 0.06 + c.reverb * 0.035;
      const pitchFold = Math.abs(Math.round(c.pitch || 1));
      const arpFold = Math.round(c.arpMode || 0);
      const seed = ruleKey.split("").reduce((acc, ch) => ((acc * 33) ^ ch.charCodeAt(0)) >>> 0, 5381);

      lifeCascade.seed = seed || 1;

      for (let y = 0; y < lifeCascade.rows; y++) {
        for (let x = 0; x < lifeCascade.cols; x++) {
          const index = y * lifeCascade.cols + x;

          const fractalA = (((x + pitchFold * 5) ^ (y + arpFold * 7)) & 11) === 0;
          const fractalB = ((((x * 3 + y * 5 + arpFold) & (x + y + pitchFold * 13)) % 23) === 0);
          const mirrored = (((lifeCascade.cols - x + y * 2 + seed) & 31) === 0);
          const noise = lifeHash(x, y, seed) < density;

          lifeCascade.cells[index] = (fractalA || fractalB || mirrored || noise) ? 1 : 0;
        }
      }
    }

    function stepLifeCascade(source = visualValues) {
      const { birth, survive } = getLifeRuleSet(source);
      const cols = lifeCascade.cols;
      const rows = lifeCascade.rows;
      const cells = lifeCascade.cells;
      const next = lifeCascade.next;

      for (let y = 0; y < rows; y++) {
        const ym = (y - 1 + rows) % rows;
        const yp = (y + 1) % rows;

        for (let x = 0; x < cols; x++) {
          const xm = (x - 1 + cols) % cols;
          const xp = (x + 1) % cols;
          const index = y * cols + x;

          const neighbors =
            cells[ym * cols + xm] + cells[ym * cols + x] + cells[ym * cols + xp] +
            cells[y * cols + xm] + cells[y * cols + xp] +
            cells[yp * cols + xm] + cells[yp * cols + x] + cells[yp * cols + xp];

          next[index] = cells[index] ? (survive.has(neighbors) ? 1 : 0) : (birth.has(neighbors) ? 1 : 0);
        }
      }

      lifeCascade.cells.set(next);

      const c = getLifeRuleControls(source);
      const mutationChance = 0.00035 + c.jitter * 0.0014 + c.activity * 0.0006;

      for (let i = 0; i < 18; i++) {
        const x = Math.floor(lifeHash(i, lifeCascade.seed + lifeCascade.scroll, lifeCascade.seed) * cols);
        const y = Math.floor(lifeHash(lifeCascade.seed, i + lifeCascade.scroll, lifeCascade.seed) * rows);
        const index = y * cols + x;

        if (Math.random() < mutationChance) {
          lifeCascade.cells[index] = lifeCascade.cells[index] ? 0 : 1;
        }
      }
    }

    function drawLifeTile(cellSize, source = visualValues) {
      const cols = lifeCascade.cols;
      const rows = lifeCascade.rows;
      const tileWidth = cols * cellSize;
      const tileHeight = rows * cellSize;

      if (lifeCascade.tileCanvas.width !== tileWidth || lifeCascade.tileCanvas.height !== tileHeight) {
        lifeCascade.tileCanvas.width = tileWidth;
        lifeCascade.tileCanvas.height = tileHeight;
      }

      const ctx = lifeCascade.tileCtx;
      const c = getLifeRuleControls(source);
      const theme = getLifeColorTheme();

      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, tileWidth, tileHeight);

      if (engine.colorMode) {
        ctx.fillStyle = theme.pixelSoft;

        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            if (!lifeCascade.cells[y * cols + x]) continue;

            const px = x * cellSize;
            const py = y * cellSize;

            ctx.fillRect(px, py, cellSize + 1, cellSize + 1);
          }
        }
      }

      const alpha = engine.colorMode ? (0.62 + c.wet * 0.20) : (0.70 + c.wet * 0.24);
      ctx.fillStyle = engine.colorMode ? theme.pixel : `rgba(255, 255, 255, ${alpha.toFixed(3)})`;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (!lifeCascade.cells[y * cols + x]) continue;

          const px = x * cellSize;
          const py = y * cellSize;

          ctx.fillRect(px, py, cellSize, cellSize);
        }
      }
    }

    function drawLifeCascade(controls, dt) {
      const canvas = ui.lifeCascade;
      if (!canvas) return;

      const ctx = canvas.getContext("2d", { alpha: false });
      const { width, height } = resizeCanvas(canvas);

      const ruleKey = getLifeRuleKey(controls);
      const c = getLifeRuleControls(controls);
      const jitterNorm = clamp(c.jitter, 0, 1);
      const cellSize = 1 + Math.round(jitterNorm * 8);

      if (ruleKey !== lifeCascade.lastRuleKey || cellSize !== lifeCascade.lastCellSize) {
        lifeCascade.lastRuleKey = ruleKey;
        lifeCascade.lastCellSize = cellSize;
        lifeCascade.accumulator = 0;
        seedLifeCascade(ruleKey, controls);
      }

      const timeNorm = clamp((controls.time - controlDefs.time.min) / (controlDefs.time.max - controlDefs.time.min), 0, 1);
      const generationsPerSecond = 2 + timeNorm * 28;
      const scrollPixelsPerSecond = 18 + timeNorm * 210;

      lifeCascade.accumulator += dt * generationsPerSecond;

      while (lifeCascade.accumulator >= 1) {
        stepLifeCascade(controls);
        lifeCascade.accumulator -= 1;
      }

      drawLifeTile(cellSize, controls);

      const tileHeight = lifeCascade.tileCanvas.height;
      lifeCascade.scroll = (lifeCascade.scroll + scrollPixelsPerSecond * dt) % tileHeight;

      const theme = getLifeColorTheme();

      ctx.save();
      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, width, height);

      const pattern = ctx.createPattern(lifeCascade.tileCanvas, "repeat");

      if (pattern) {
        ctx.translate(0, lifeCascade.scroll);
        ctx.fillStyle = pattern;
        ctx.fillRect(0, -tileHeight, width, height + tileHeight * 2);
      }

      if (engine.colorMode) {
        const glow = ctx.createRadialGradient(width * 0.50, height * 0.42, 0, width * 0.50, height * 0.42, Math.max(width, height) * 0.72);
        glow.addColorStop(0, theme.glow);
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, -lifeCascade.scroll, width, height);
      }

      const vignette = ctx.createRadialGradient(width / 2, height / 2, Math.min(width, height) * 0.10, width / 2, height / 2, Math.max(width, height) * 0.70);
      vignette.addColorStop(0, "rgba(0, 0, 0, 0.00)");
      vignette.addColorStop(1, theme.vignette);
      ctx.fillStyle = vignette;
      ctx.fillRect(0, -lifeCascade.scroll, width, height);

      ctx.restore();
    }

    function drawDiamondConnectors() {
      const canvas = ui.diamondConnectors;
      const frame = document.querySelector(".scope-frame");
      const glass = document.querySelector(".scope-glass");
      const life = ui.lifeCascade;

      if (!canvas || !frame || !glass || !life) return;

      const ctx = canvas.getContext("2d");
      const { width, height } = resizeCanvas(canvas);
      const dpr = window.devicePixelRatio || 1;

      const frameRect = frame.getBoundingClientRect();
      const glassRect = glass.getBoundingClientRect();
      const lifeRect = life.getBoundingClientRect();

      const left = (glassRect.left - frameRect.left) * dpr;
      const right = (glassRect.right - frameRect.left) * dpr;
      const top = (glassRect.top - frameRect.top) * dpr;
      const bottom = (glassRect.bottom - frameRect.top) * dpr;
      const cx = (left + right) / 2;
      const cy = (top + bottom) / 2;

      const rLeft = (lifeRect.left - frameRect.left) * dpr;
      const rRight = (lifeRect.right - frameRect.left) * dpr;
      const rTop = (lifeRect.top - frameRect.top) * dpr;
      const rBottom = (lifeRect.bottom - frameRect.top) * dpr;
      const rRadius = 16 * dpr;

      const vTop = { x: cx, y: top };
      const vRight = { x: right, y: cy };
      const vBottom = { x: cx, y: bottom };
      const vLeft = { x: left, y: cy };

      /*
        Target look:
        - Game of Life remains black.
        - The old black-looking perimeter is now a flat green-grey outline.
        - The cross and diamond are the same flat material and connect to that outline.
      */
      const frameWidth = Math.max(5.5 * dpr, Math.min(width, height) * 0.0075);
      const patch = frameWidth * 1.10;

      const material = ctx.createLinearGradient(0, 0, width, height);
      material.addColorStop(0.00, "#8b9793");
      material.addColorStop(0.24, "#434d4a");
      material.addColorStop(0.62, "#1c2221");
      material.addColorStop(1.00, "#73807b");

      function roundedRectPath() {
        ctx.moveTo(rLeft + rRadius, rTop);
        ctx.lineTo(rRight - rRadius, rTop);
        ctx.quadraticCurveTo(rRight, rTop, rRight, rTop + rRadius);
        ctx.lineTo(rRight, rBottom - rRadius);
        ctx.quadraticCurveTo(rRight, rBottom, rRight - rRadius, rBottom);
        ctx.lineTo(rLeft + rRadius, rBottom);
        ctx.quadraticCurveTo(rLeft, rBottom, rLeft, rBottom - rRadius);
        ctx.lineTo(rLeft, rTop + rRadius);
        ctx.quadraticCurveTo(rLeft, rTop, rLeft + rRadius, rTop);
      }

      function diamondPath() {
        ctx.moveTo(vTop.x, vTop.y);
        ctx.lineTo(vRight.x, vRight.y);
        ctx.lineTo(vBottom.x, vBottom.y);
        ctx.lineTo(vLeft.x, vLeft.y);
        ctx.closePath();
      }

      function crossPath() {
        ctx.moveTo(cx, rTop);
        ctx.lineTo(cx, top);
        ctx.moveTo(cx, bottom);
        ctx.lineTo(cx, rBottom);
        ctx.moveTo(rLeft, cy);
        ctx.lineTo(left, cy);
        ctx.moveTo(right, cy);
        ctx.lineTo(rRight, cy);
      }

      function strokePath(pathBuilder) {
        ctx.beginPath();
        pathBuilder();
        ctx.stroke();
      }

      function patchJoint(x, y) {
        ctx.fillRect(x - patch / 2, y - patch / 2, patch, patch);
      }

      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.lineWidth = frameWidth;
      ctx.lineCap = "butt";
      ctx.lineJoin = "miter";
      ctx.miterLimit = 4;
      ctx.strokeStyle = material;
      ctx.fillStyle = material;

      strokePath(roundedRectPath);
      strokePath(crossPath);
      strokePath(diamondPath);

      [
        [cx, rTop],
        [cx, top],
        [right, cy],
        [rRight, cy],
        [cx, bottom],
        [cx, rBottom],
        [left, cy],
        [rLeft, cy]
      ].forEach(([x, y]) => patchJoint(x, y));

      ctx.restore();
    }

    function drawMainScope() {
      const canvas = ui.scope;
      const ctx = canvas.getContext("2d");
      const { width, height } = resizeCanvas(canvas);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#07100c";
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.strokeStyle = "rgba(151, 180, 162, 0.16)";
      ctx.lineWidth = 1;

      const step = Math.max(32, width / 12);

      for (let x = 0; x <= width; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }

      for (let y = 0; y <= height; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(224, 236, 230, 0.20)";

      ctx.beginPath();
      ctx.moveTo(0, height / 2);
      ctx.lineTo(width, height / 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(width / 2, 0);
      ctx.lineTo(width / 2, height);
      ctx.stroke();

      ctx.restore();

      const hasLeft = !!engine.leftAnalyser;
      const hasRight = !!engine.rightAnalyser;

      if (hasLeft || hasRight) {
        if (hasLeft) {
          const leftData = new Uint8Array(engine.leftAnalyser.fftSize);
          engine.leftAnalyser.getByteTimeDomainData(leftData);

          ctx.save();
          ctx.lineWidth = Math.max(1.8, width / 420);
          ctx.strokeStyle = "rgba(201, 61, 103, 0.95)";
          ctx.shadowColor = "rgba(165, 31, 70, 0.66)";
          ctx.shadowBlur = 10;
          ctx.beginPath();

          const sliceX = width / (leftData.length - 1);

          for (let i = 0; i < leftData.length; i++) {
            const x = i * sliceX;
            const normalized = (leftData[i] - 128) / 128;
            const y = height / 2 + normalized * height * 0.28;

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }

          ctx.stroke();
          ctx.restore();
        }

        if (hasRight) {
          const rightData = new Uint8Array(engine.rightAnalyser.fftSize);
          engine.rightAnalyser.getByteTimeDomainData(rightData);

          ctx.save();
          ctx.lineWidth = Math.max(2, width / 360);
          ctx.strokeStyle = "#6d112d";
          ctx.shadowColor = "rgba(165, 31, 70, 0.92)";
          ctx.shadowBlur = 18;
          ctx.beginPath();

          const sliceY = height / (rightData.length - 1);

          for (let i = 0; i < rightData.length; i++) {
            const y = i * sliceY;
            const normalized = (rightData[i] - 128) / 128;
            const x = width / 2 + normalized * width * 0.28;

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }

          ctx.stroke();

          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(255, 196, 212, 0.42)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.restore();
        }
      } else {
        ctx.save();
        ctx.fillStyle = "rgba(224, 236, 230, 0.34)";
        ctx.font = `${Math.max(12, width / 42)}px SFMono-Regular, Consolas, monospace`;
        ctx.textAlign = "center";
        ctx.fillText("Standby", width / 2, height / 2);
        ctx.restore();
      }
    }

    function pseudoRandom(n) {
      const x = Math.sin(n * 127.1) * 43758.5453123;
      return (x - Math.floor(x)) * 2 - 1;
    }

    function waveformValueForDisplay(wave, phase, t) {
      const angle = phase + t * Math.PI * 2 * 1.2;

      if (wave === "sine") return Math.sin(angle);
      if (wave === "triangle") return (2 / Math.PI) * Math.asin(Math.sin(angle));
      if (wave === "square") return Math.sin(angle) >= 0 ? 1 : -1;
      if (wave === "random") return pseudoRandom(Math.floor((phase / (Math.PI * 2)) + t * 9));

      return Math.sin(angle);
    }

    function drawLfoScope(canvas, config, runtime) {
      const ctx = canvas.getContext("2d");
      const { width, height } = resizeCanvas(canvas);
      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.min(width, height) / 2 - 4;

      ctx.clearRect(0, 0, width, height);

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();

      ctx.fillStyle = "#07100c";
      ctx.fillRect(0, 0, width, height);

      const rg = ctx.createRadialGradient(cx, cy, radius * 0.12, cx, cy, radius);
      rg.addColorStop(0, "rgba(35, 88, 55, 0.18)");
      rg.addColorStop(1, "rgba(7, 16, 12, 0)");
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "rgba(151, 180, 162, 0.14)";
      ctx.lineWidth = 1;

      for (let i = -2; i <= 2; i++) {
        const x = cx + i * radius * 0.4;
        ctx.beginPath();
        ctx.moveTo(x, cy - radius);
        ctx.lineTo(x, cy + radius);
        ctx.stroke();
      }

      for (let i = -2; i <= 2; i++) {
        const y = cy + i * radius * 0.4;
        ctx.beginPath();
        ctx.moveTo(cx - radius, y);
        ctx.lineTo(cx + radius, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(224, 236, 230, 0.18)";
      ctx.beginPath();
      ctx.moveTo(cx - radius, cy);
      ctx.lineTo(cx + radius, cy);
      ctx.stroke();

      const xStart = cx - radius * 0.82;
      const xEnd = cx + radius * 0.82;
      const amp = radius * 0.34;
      const points = 120;

      ctx.save();
      ctx.strokeStyle = config.enabled ? "#6d112d" : "rgba(109, 17, 45, 0.50)";
      ctx.lineWidth = 2;
      ctx.shadowColor = config.enabled ? "rgba(165, 31, 70, 0.85)" : "rgba(109, 17, 45, 0.35)";
      ctx.shadowBlur = 8;
      ctx.beginPath();

      for (let i = 0; i <= points; i++) {
        const t = i / points;
        const x = xStart + (xEnd - xStart) * t;
        const v = waveformValueForDisplay(config.wave, runtime.phase, t);
        const y = cy + v * amp;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = config.enabled ? "rgba(255, 196, 212, 0.44)" : "rgba(255, 196, 212, 0.18)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = "rgba(232, 240, 236, 0.18)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(cx, cy, radius - 1, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function renderFrame(now) {
      const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
      lastFrameTime = now;

      const controls = computeEffectiveControls(dt);
      const params = extractAudioParams(controls);

      engine.currentParams = params;
      engine.arpMode = Math.round(controls.arpMode);
      engine.pitchMode = Math.round(controls.pitch);
      engine.rangeMode = Math.round(controls.range);

      updateAllControlVisuals(controls, true);
      updateLfoLabels();
      applyAudioParams(params, controls);

      drawLifeCascade(controls, dt);
      drawDiamondConnectors();
      drawMainScope();
      drawLfoScope(ui.lfo1Scope, getLfoConfig(1), lfoRuntime.lfo1);
      drawLfoScope(ui.lfo2Scope, getLfoConfig(2), lfoRuntime.lfo2);

      requestAnimationFrame(renderFrame);
    }

    function bindKnobDrag(button) {
      const id = button.dataset.for;
      const input = ui[id];

      let dragging = false;
      let startY = 0;
      let startValue = 0;

      button.addEventListener("pointerdown", event => {
        dragging = true;
        startY = event.clientY;
        startValue = manualValues[id];
        button.setPointerCapture(event.pointerId);
        button.style.cursor = "grabbing";
      });

      button.addEventListener("pointermove", event => {
        if (!dragging) return;

        const min = Number(input.min);
        const max = Number(input.max);
        const delta = (startY - event.clientY) / 140;
        const next = clamp(startValue + delta * (max - min), min, max);

        manualValues[id] = next;
        input.value = next;
        setKnobVisual(id, next, false);
      });

      button.addEventListener("pointerup", event => {
        dragging = false;
        button.releasePointerCapture(event.pointerId);
        button.style.cursor = "grab";
      });
    }

    Object.keys(controlDefs).forEach(id => {
      ui[id].addEventListener("input", event => {
        if (event.isTrusted) {
          manualValues[id] = Number(ui[id].value);
        }
      });
    });

    [
      ui.lfo1Rate,
      ui.lfo1Depth,
      ui.lfo1Min,
      ui.lfo1Max,
      ui.lfo2Rate,
      ui.lfo2Depth,
      ui.lfo2Min,
      ui.lfo2Max,
      ui.lfo1Wave,
      ui.lfo2Wave,
      ui.lfo1Target,
      ui.lfo2Target,
      ui.lfo1Enable,
      ui.lfo2Enable
    ].forEach(el => {
      el.addEventListener("input", updateLfoLabels);
      el.addEventListener("change", updateLfoLabels);
    });

    document.querySelectorAll(".knob").forEach(bindKnobDrag);

    [["lfo1Min", "lfo1Max"], ["lfo2Min", "lfo2Max"]].forEach(([minId, maxId]) => {
      ui[minId].addEventListener("input", () => {
        if (Number(ui[minId].value) > Number(ui[maxId].value)) {
          ui[maxId].value = ui[minId].value;
        }
        updateLfoLabels();
      });

      ui[maxId].addEventListener("input", () => {
        if (Number(ui[maxId].value) < Number(ui[minId].value)) {
          ui[minId].value = ui[maxId].value;
        }
        updateLfoLabels();
      });
    });

    ui.startButton.addEventListener("click", startAudio);

    ui.colorButton.addEventListener("click", () => {
      setColorMode(!engine.colorMode);
    });

    ui.micSelect.addEventListener("change", async () => {
      if (engine.active) {
        await stopAudio();
        await startAudio();
      }
    });

    if (navigator.mediaDevices?.addEventListener) {
      navigator.mediaDevices.addEventListener("devicechange", () => {
        populateMicrophones().catch(() => {});
      });
    }

    populateTargetSelects();
    ui.lfo1Target.value = "none";
    ui.lfo2Target.value = "none";
    syncManualValues();
    setColorMode(false);
    updateAllControlVisuals(manualValues, true);
    updateLfoLabels();
    populateMicrophones().catch(() => {});
    requestAnimationFrame(renderFrame);
  </script>

<script>
  (function(){
    const donateBtn = document.getElementById('donateBtn');
    const modal = document.getElementById('donateModal');
    if(!donateBtn || !modal) return;

    const closeBtn = modal.querySelector('.donate-close');
    const backdrop = modal.querySelector('.donate-backdrop');

    function open(){ modal.hidden = false; }
    function close(){ modal.hidden = true; }

    donateBtn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    backdrop.addEventListener('click', close);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !modal.hidden) close();
    });
  })();
