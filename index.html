    :root {
      --ink: #edf1ef;
      --accent: #6d112d;
      --scope-bg: #07100c;
      --scope-grid: rgba(151, 180, 162, 0.16);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100svh;
    }

    body {
      display: grid;
      place-items: center;
      padding: 6px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.06), transparent 35%),
        linear-gradient(135deg, #0b0e0f, #14191a 55%, #0a0d0e);
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .console {
      position: relative;
      width: min(1180px, 98vw);
      height: min(94svh, 760px);
      min-height: 0;
      padding: 10px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.03)),
        linear-gradient(135deg, #b5c0bb 0%, #8a9792 20%, #65706d 48%, #4b5553 72%, #909c97 100%);
      box-shadow:
        0 28px 70px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -18px 40px rgba(0, 0, 0, 0.14);
    }

    .console::before,
    .console::after,
    .screw {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #d7ddd9, #86908c 42%, #394240 64%, #99a49f 78%, #4a5451);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.28),
        0 2px 4px rgba(0, 0, 0, 0.26);
    }

    .console::before { top: 11px; left: 11px; }
    .console::after { top: 11px; right: 11px; }
    .screw.bottom-left { left: 11px; bottom: 11px; }
    .screw.bottom-right { right: 11px; bottom: 11px; }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 38px;
      margin: 0 8px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    h1 {
      margin: 0;
      color: #f2f5f3;
      font-family: "Snowstorm Light", Inter, sans-serif;
      font-size: clamp(1.05rem, 1.7vw, 1.5rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: 255px minmax(320px, 1fr) 255px;
      gap: 10px;
      height: calc(100% - 46px);
      min-height: 0;
    }

    .panel {
      min-height: 0;
      padding: 9px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        linear-gradient(135deg, rgba(202, 211, 207, 0.28), rgba(91, 102, 98, 0.26));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 -12px 28px rgba(0, 0, 0, 0.10);
    }

    .left-panel,
    .right-panel,
    .scope-panel {
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow: hidden;
    }

    .minimal-row {
      display: grid;
      gap: 7px;
    }

     .engage {
      min-height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 11px;
      cursor: pointer;
      color: #f4ecf0;
      font-family: "Snowstorm Light", Inter, sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.03)),
        linear-gradient(180deg, #8c223f, #561128);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 8px 14px rgba(0, 0, 0, 0.14);
    }

     .select,
    .small-select {
      width: 100%;
      min-height: 29px;
      padding: 0 10px;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      outline: none;
      color: #eef2ef;
      font: 700 0.64rem/1 Inter, sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        linear-gradient(180deg, #202625, #101514);
    }

    .select option,
    .small-select option {
      color: #eef2ef;
      background: #111615;
    }

    .knob-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .knob-card,
    .lfo-card,
    .arp-card {
      border-radius: 13px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        linear-gradient(135deg, rgba(185, 196, 191, 0.20), rgba(73, 84, 80, 0.24));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.10),
        inset 0 -10px 20px rgba(0, 0, 0, 0.08);
    }

    .knob-card {
      display: grid;
      place-items: center;
      min-height: 81px;
      padding: 4px 6px;
      gap: 3px;
    }

    .knob-label {
      color: #f0f3f2;
      font: 800 0.52rem/1 Inter, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .knob-value {
      min-height: 10px;
      color: #d0d8d4;
      font: 700 0.50rem/1 "SFMono-Regular", Consolas, monospace;
    }

    .knob {
      --rot: 0deg;
      --fill: 160deg;
      position: relative;
      width: 45px;
      height: 45px;
      border: none;
      border-radius: 50%;
      cursor: grab;
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.20), transparent 12%),
        radial-gradient(circle at 50% 52%, #4f5855, #2d3533 55%, #121716 68%, #606b67 73%, #202827 84%),
        conic-gradient(from -140deg, rgba(109, 17, 45, 0.94) 0deg var(--fill), rgba(255, 255, 255, 0.05) var(--fill) 280deg, transparent 280deg 360deg);
      box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.08),
        inset 0 -10px 14px rgba(0, 0, 0, 0.58),
        0 7px 11px rgba(0, 0, 0, 0.25);
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 5px;
      width: 3px;
      height: 13px;
      transform: translateX(-50%) rotate(var(--rot));
      transform-origin: 50% 17px;
      border-radius: 999px;
      background: #eef2ef;
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.20);
    }

    .range {
      width: 100%;
      height: 4px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 999px;
      outline: none;
      background: linear-gradient(90deg, #61706b, #45504d);
    }

    .range::-webkit-slider-thumb {
      width: 10px;
      height: 10px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 50%;
      border: 1px solid #67736e;
      background: #dde5e1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

    .range::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid #67736e;
      background: #dde5e1;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      cursor: pointer;
    }

     .scope-frame {
      flex: 1;
      min-height: 0;
      padding: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(145deg, #8b9793, #434d4a 24%, #1c2221 62%, #73807b 100%);
      box-shadow:
        inset 0 0 28px rgba(0, 0, 0, 0.62),
        0 12px 22px rgba(0, 0, 0, 0.18);
      display: grid;
      place-items: center;
    }

     .scope-glass {
      position: relative;
      width: min(100%, 560px);
      aspect-ratio: 1 / 1;
      max-width: 100%;
      max-height: 100%;
      overflow: hidden;
      border-radius: 0;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0 50%);
      background:
        radial-gradient(circle at 50% 45%, rgba(41, 96, 60, 0.20), transparent 55%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 16%),
        var(--scope-bg);
      box-shadow:
        inset 0 0 40px rgba(0, 0, 0, 0.88),
        inset 0 0 90px rgba(103, 255, 168, 0.05);
    }

    .scope-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(var(--scope-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--scope-grid) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #scope {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px rgba(109, 17, 45, 0.85));
    }

    .readouts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .readout,
    .tiny-readout,
    .arp-readout {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 25px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: #f0f4f2;
      font: 800 0.52rem/1 "SFMono-Regular", Consolas, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        linear-gradient(180deg, #2f3735, #232928);
    }

    .lfo-stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 7px;
      height: 100%;
      min-height: 0;
    }

    .lfo-card {
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      min-height: 0;
      padding: 7px;
      gap: 4px;
    }

    .lfo-title,
    .arp-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1px;
      color: #f0f4f2;
      font: 800 0.56rem/1 Inter, sans-serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .lfo-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #d7dfdb;
      font: 700 0.50rem/1 Inter, sans-serif;
      letter-spacing: 0.08em;
    }

    .lfo-toggle input {
      width: 11px;
      height: 11px;
      accent-color: var(--accent);
    }

    .field {
      display: grid;
      gap: 2px;
    }

    .field label,
    .boost-row label {
      color: #d6deda;
      font: 800 0.48rem/1 Inter, sans-serif;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    .lfo-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .tiny-readout,
    .arp-readout {
      min-height: 22px;
      font-size: 0.50rem;
    }

    .lfo-scope-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
      padding-top: 1px;
    }

    .lfo-scope-frame {
      width: 66px;
      height: 66px;
      padding: 4px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(145deg, #96a29d, #44504d 28%, #262d2c 70%, #7d8984);
      box-shadow:
        inset 0 0 16px rgba(0, 0, 0, 0.46),
        0 6px 12px rgba(0, 0, 0, 0.12);
    }

    .lfo-scope-glass {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 45%, rgba(41, 96, 60, 0.20), transparent 55%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 16%),
        var(--scope-bg);
      box-shadow:
        inset 0 0 20px rgba(0, 0, 0, 0.88),
        inset 0 0 44px rgba(103, 255, 168, 0.05);
    }

    .lfo-scope {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 6px rgba(109, 17, 45, 0.80));
    }

    .arp-card {
      display: grid;
      gap: 5px;
      padding: 7px;
    }

    .arp-scale {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      color: #d6deda;
      text-align: center;
      font: 700 0.36rem/1.2 Inter, sans-serif;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .boost-row {
      display: grid;
      gap: 4px;
      padding-top: 1px;
    }

    @media (max-width: 1080px) {
      body {
        overflow: auto;
      }

      .console {
        height: auto;
      }

      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .scope-frame {
        min-height: 360px;
      }

      .scope-glass {
        width: min(100%, 420px);
      }

      .lfo-stack {
        grid-template-rows: auto;
      }

      .lfo-card {
        grid-template-rows: auto;
      }
    }
  </style>
</head>

<body>
  <main class="console">
    <span class="screw bottom-left"></span>
    <span class="screw bottom-right"></span>

    <div class="topbar">
      <h1>Gudeco Mosaic Lab Console</h1>
    </div>

    <section class="layout">
      <aside class="panel left-panel">
        <div class="minimal-row">
          <button class="engage" id="startButton" type="button">Input</button>
          <select class="select" id="micSelect" aria-label="Microphone source">
            <option value="">Default microphone</option>
          </select>
        </div>

        <div class="knob-grid">
          <div class="knob-card">
            <div class="knob-label">Activity</div>
            <button class="knob" type="button" data-for="activity"></button>
            <input class="range" id="activity" type="range" min="0" max="1" step="0.01" value="0.62">
            <div class="knob-value" id="activityValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Time</div>
            <button class="knob" type="button" data-for="time"></button>
            <input class="range" id="time" type="range" min="60" max="820" step="1" value="240">
            <div class="knob-value" id="timeValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Repeats</div>
            <button class="knob" type="button" data-for="repeats"></button>
            <input class="range" id="repeats" type="range" min="0" max="1" step="0.01" value="0.48">
            <div class="knob-value" id="repeatsValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Jitter</div>
            <button class="knob" type="button" data-for="jitter"></button>
            <input class="range" id="jitter" type="range" min="0" max="1" step="0.01" value="0.18">
            <div class="knob-value" id="jitterValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Filter</div>
            <button class="knob" type="button" data-for="filter"></button>
            <input class="range" id="filter" type="range" min="700" max="12500" step="1" value="5200">
            <div class="knob-value" id="filterValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Reverb</div>
            <button class="knob" type="button" data-for="reverb"></button>
            <input class="range" id="reverb" type="range" min="0" max="1" step="0.01" value="0.22">
            <div class="knob-value" id="reverbValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Wet</div>
            <button class="knob" type="button" data-for="wet"></button>
            <input class="range" id="wet" type="range" min="0" max="1" step="0.01" value="0.72">
            <div class="knob-value" id="wetValue"></div>
          </div>

          <div class="knob-card">
            <div class="knob-label">Dry</div>
            <button class="knob" type="button" data-for="dry"></button>
            <input class="range" id="dry" type="range" min="0" max="1" step="0.01" value="0.12">
            <div class="knob-value" id="dryValue"></div>
          </div>
        </div>

        <div class="arp-card">
          <div class="arp-title">
            <span>Arpeggio</span>
            <div class="arp-readout" id="arpModeValue">Off</div>
          </div>

          <input class="range" id="arpMode" type="range" min="0" max="6" step="1" value="0">

          <div class="arp-scale">
            <span>Off</span>
            <span>Maj</span>
            <span>Min</span>
            <span>Dim</span>
            <span>Aug</span>
            <span>Sus4</span>
            <span>Dom7</span>
          </div>

          <div class="boost-row">
            <label for="wetBoost">Wet Boost</label>
            <input class="range" id="wetBoost" type="range" min="1" max="8" step="0.1" value="8">
            <div class="arp-readout" id="wetBoostValue">8.0x</div>
          </div>

          <div class="boost-row">
            <label for="phase">Phase Offset</label>
            <input class="range" id="phase" type="range" min="0" max="1" step="0.01" value="1">
            <div class="arp-readout" id="phaseValue">250 ms</div>
          </div>
        </div>
      </aside>

      <section class="panel scope-panel">
        <div class="scope-frame">
          <div class="scope-glass">
            <canvas id="scope"></canvas>
          </div>
        </div>

        <div class="readouts">
          <div class="readout" id="readInput">Input 000%</div>
          <div class="readout" id="readVoices">Voices 00</div>
        </div>
      </section>

      <aside class="panel right-panel">
        <div class="lfo-stack">
          <div class="lfo-card">
            <div class="lfo-title">
              <span>LFO 1</span>
              <input type="checkbox" id="lfo1Enable" checked hidden>
            </div>

            <div class="field">
              <label for="lfo1Target">Target</label>
              <select class="small-select" id="lfo1Target"></select>
            </div>

            <div class="field">
              <label for="lfo1Wave">Wave</label>
              <select class="small-select" id="lfo1Wave">
                <option value="sine">Sine</option>
                <option value="triangle">Triangle</option>
                <option value="square">Square</option>
                <option value="random">Random</option>
              </select>
            </div>

            <div class="lfo-pair">
              <div class="field">
                <label for="lfo1Rate">Rate</label>
                <input class="range" id="lfo1Rate" type="range" min="0.02" max="8" step="0.01" value="0.45">
                <div class="tiny-readout" id="lfo1RateValue"></div>
              </div>

              <div class="field">
                <label for="lfo1Depth">Depth</label>
                <input class="range" id="lfo1Depth" type="range" min="0" max="1" step="0.01" value="1">
                <div class="tiny-readout" id="lfo1DepthValue"></div>
              </div>
            </div>

            <div class="lfo-scope-wrap">
              <div class="lfo-scope-frame">
                <div class="lfo-scope-glass">
                  <canvas class="lfo-scope" id="lfo1Scope"></canvas>
                </div>
              </div>
            </div>
          </div>

          <div class="lfo-card">
            <div class="lfo-title">
              <span>LFO 2</span>
              <input type="checkbox" id="lfo2Enable" checked hidden>
            </div>

            <div class="field">
              <label for="lfo2Target">Target</label>
              <select class="small-select" id="lfo2Target"></select>
            </div>

            <div class="field">
              <label for="lfo2Wave">Wave</label>
              <select class="small-select" id="lfo2Wave">
                <option value="sine">Sine</option>
                <option value="triangle">Triangle</option>
                <option value="square">Square</option>
                <option value="random">Random</option>
              </select>
            </div>

            <div class="lfo-pair">
              <div class="field">
                <label for="lfo2Rate">Rate</label>
                <input class="range" id="lfo2Rate" type="range" min="0.02" max="8" step="0.01" value="0.36">
                <div class="tiny-readout" id="lfo2RateValue"></div>
              </div>

              <div class="field">
                <label for="lfo2Depth">Depth</label>
                <input class="range" id="lfo2Depth" type="range" min="0" max="1" step="0.01" value="1">
                <div class="tiny-readout" id="lfo2DepthValue"></div>
              </div>
            </div>

            <div class="lfo-scope-wrap">
              <div class="lfo-scope-frame">
                <div class="lfo-scope-glass">
                  <canvas class="lfo-scope" id="lfo2Scope"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const ui = {
      startButton: document.getElementById("startButton"),
      micSelect: document.getElementById("micSelect"),
      scope: document.getElementById("scope"),
      readInput: document.getElementById("readInput"),
      readVoices: document.getElementById("readVoices"),

      activity: document.getElementById("activity"),
      time: document.getElementById("time"),
      repeats: document.getElementById("repeats"),
      jitter: document.getElementById("jitter"),
      filter: document.getElementById("filter"),
      reverb: document.getElementById("reverb"),
      wet: document.getElementById("wet"),
      dry: document.getElementById("dry"),
      arpMode: document.getElementById("arpMode"),
      wetBoost: document.getElementById("wetBoost"),
      phase: document.getElementById("phase"),

      arpModeValue: document.getElementById("arpModeValue"),
      wetBoostValue: document.getElementById("wetBoostValue"),
      phaseValue: document.getElementById("phaseValue"),

      lfo1Enable: document.getElementById("lfo1Enable"),
      lfo1Target: document.getElementById("lfo1Target"),
      lfo1Wave: document.getElementById("lfo1Wave"),
      lfo1Rate: document.getElementById("lfo1Rate"),
      lfo1Depth: document.getElementById("lfo1Depth"),
      lfo1RateValue: document.getElementById("lfo1RateValue"),
      lfo1DepthValue: document.getElementById("lfo1DepthValue"),
      lfo1Scope: document.getElementById("lfo1Scope"),

      lfo2Enable: document.getElementById("lfo2Enable"),
      lfo2Target: document.getElementById("lfo2Target"),
      lfo2Wave: document.getElementById("lfo2Wave"),
      lfo2Rate: document.getElementById("lfo2Rate"),
      lfo2Depth: document.getElementById("lfo2Depth"),
      lfo2RateValue: document.getElementById("lfo2RateValue"),
      lfo2DepthValue: document.getElementById("lfo2DepthValue"),
      lfo2Scope: document.getElementById("lfo2Scope")
    };

    const arpModes = [
      { name: "Off", intervals: [12] },
      { name: "Major", intervals: [4, 7, 12, 16, 19, 24] },
      { name: "Minor", intervals: [3, 7, 12, 15, 19, 24] },
      { name: "Diminished", intervals: [3, 6, 9, 12, 15, 18] },
      { name: "Augmented", intervals: [4, 8, 12, 16, 20, 24] },
      { name: "Sus4", intervals: [5, 7, 12, 17, 19, 24] },
      { name: "Dominant 7", intervals: [4, 7, 10, 12, 16, 19, 22] }
    ];

    const controlDefs = {
      activity: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      time: { min: 60, max: 820, format: v => `${Math.round(v)} ms`, knob: true },
      repeats: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      jitter: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      filter: { min: 700, max: 12500, format: v => `${Math.round(v)} Hz`, knob: true },
      reverb: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      wet: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      dry: { min: 0, max: 1, format: v => `${Math.round(v * 100)}%`, knob: true },
      arpMode: { min: 0, max: 6, format: v => arpModes[Math.round(v)]?.name || "Off", stepped: true },
      wetBoost: { min: 1, max: 8, format: v => `${v.toFixed(1)}x` },
      phase: { min: 0, max: 1, format: v => `${Math.round(v * MAX_PHASE_DELAY_MS)} ms` }
    };

    const knobIds = Object.keys(controlDefs).filter(id => controlDefs[id].knob);

    const targetOptions = [
      ["none", "None"],
      ["activity", "Activity"],
      ["time", "Time"],
      ["repeats", "Repeats"],
      ["jitter", "Jitter"],
      ["filter", "Filter"],
      ["reverb", "Reverb"],
      ["wet", "Wet"],
      ["dry", "Dry"],
      ["arpMode", "Arpeggio"],
      ["wetBoost", "Wet Boost"],
      ["phase", "Phase"]
    ];

    const manualValues = {};
    const visualValues = {};

    const engine = {
      context: null,
      stream: null,
      source: null,
      processor: null,
      leftAnalyser: null,
      rightAnalyser: null,
      rightDelay: null,
      filter: null,
      wetGain: null,
      dryGain: null,
      reverbInput: null,
      processedBus: null,
      currentParams: null,
      arpMode: 0,

      bufferLength: 0,
      left: null,
      right: null,
      writeIndex: 0,
      voices: [],
      spawnCountdown: 0,
      inputPeak: 0,
      active: false
    };

    const lfoRuntime = {
      lfo1: { phase: 0, lastCycle: -1, held: 0, current: 0 },
      lfo2: { phase: 0, lastCycle: -1, held: 0, current: 0 }
    };

    let lastFrameTime = performance.now();

    const MAX_PHASE_DELAY_MS = 250;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function semitonesToRate(semitones) {
      return Math.pow(2, semitones / 12);
    }

    function getArpInterval(modeIndex, step) {
      const mode = arpModes[modeIndex] || arpModes[0];
      return mode.intervals[step % mode.intervals.length];
    }

    function setStatus(text) {
      ui.startButton.title = text;
    }

    function populateTargetSelects() {
      [ui.lfo1Target, ui.lfo2Target].forEach(select => {
        select.innerHTML = "";

        targetOptions.forEach(([value, label]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = label;
          select.appendChild(option);
        });
      });
    }

    function syncManualValues() {
      Object.keys(controlDefs).forEach(id => {
        manualValues[id] = Number(ui[id].value);
        visualValues[id] = manualValues[id];
      });
    }

    function setKnobVisual(id, value, moveSlider = true) {
      const def = controlDefs[id];
      const knob = document.querySelector(`.knob[data-for="${id}"]`);
      const valueLabel = document.getElementById(`${id}Value`);
      const pct = clamp((value - def.min) / (def.max - def.min), 0, 1);
      const deg = -135 + pct * 270;

      if (knob) {
        knob.style.setProperty("--rot", `${deg}deg`);
        knob.style.setProperty("--fill", `${pct * 280}deg`);
      }

      if (valueLabel) {
        valueLabel.textContent = def.format(value);
      }

      if (moveSlider && ui[id]) {
        ui[id].value = value;
      }

      visualValues[id] = value;
    }

    function setControlVisual(id, value, moveSlider = true) {
      const def = controlDefs[id];
      let v = clamp(value, def.min, def.max);

      if (def.stepped) {
        v = Math.round(v);
      }

      if (def.knob) {
        setKnobVisual(id, v, moveSlider);
        return;
      }

      if (id === "arpMode") {
        if (moveSlider) ui.arpMode.value = v;
        ui.arpModeValue.textContent = def.format(v);
        visualValues[id] = v;
        return;
      }

      if (id === "wetBoost") {
        if (moveSlider) ui.wetBoost.value = v;
        ui.wetBoostValue.textContent = def.format(v);
        visualValues[id] = v;
        return;
      }

      if (id === "phase") {
        if (moveSlider) ui.phase.value = v;
        ui.phaseValue.textContent = def.format(v);
        visualValues[id] = v;
      }
    }

    function updateAllControlVisuals(valuesObj, moveSliders = true) {
      Object.keys(controlDefs).forEach(id => {
        setControlVisual(id, valuesObj[id], moveSliders);
      });
    }

    function updateLfoLabels() {
      ui.lfo1RateValue.textContent = `${Number(ui.lfo1Rate.value).toFixed(2)} Hz`;
      ui.lfo1DepthValue.textContent = `${Math.round(Number(ui.lfo1Depth.value) * 100)}%`;
      ui.lfo2RateValue.textContent = `${Number(ui.lfo2Rate.value).toFixed(2)} Hz`;
      ui.lfo2DepthValue.textContent = `${Math.round(Number(ui.lfo2Depth.value) * 100)}%`;
    }

    function getLfoConfig(index) {
      return {
        enabled: ui[`lfo${index}Enable`].checked,
        target: ui[`lfo${index}Target`].value,
        wave: ui[`lfo${index}Wave`].value,
        rate: Number(ui[`lfo${index}Rate`].value),
        depth: Number(ui[`lfo${index}Depth`].value)
      };
    }

    function evalLfo(name, config, dt) {
      const rt = lfoRuntime[name];

      rt.phase += dt * config.rate * Math.PI * 2;

      if (rt.phase > Math.PI * 2000) {
        rt.phase = rt.phase % (Math.PI * 2);
      }

      const cycle = Math.floor(rt.phase / (Math.PI * 2));

      if (config.wave === "random") {
        if (cycle !== rt.lastCycle) {
          rt.held = Math.random() * 2 - 1;
          rt.lastCycle = cycle;
        }

        rt.current = rt.held;
        return rt.current;
      }

      const s = Math.sin(rt.phase);

      if (config.wave === "sine") rt.current = s;
      else if (config.wave === "triangle") rt.current = (2 / Math.PI) * Math.asin(s);
      else if (config.wave === "square") rt.current = s >= 0 ? 1 : -1;
      else rt.current = s;

      return rt.current;
    }

    function computeEffectiveControls(dt) {
      const effective = { ...manualValues };

      [1, 2].forEach(index => {
        const cfg = getLfoConfig(index);
        const name = `lfo${index}`;
        const wave = evalLfo(name, cfg, dt);

        if (!cfg.enabled || cfg.target === "none" || !controlDefs[cfg.target]) return;

        const def = controlDefs[cfg.target];
        const span = def.max - def.min;

        /*
          Full-range LFO mapping:
          - depth 0% keeps the manual control value.
          - depth 100% sweeps across the entire target range, min to max.
          - this also means Arpeggio reaches every mode from Off through Dom7.
        */
        const normalizedWave = (wave + 1) / 2;
        const fullRangeValue = def.min + normalizedWave * span;

        effective[cfg.target] = effective[cfg.target] +
          (fullRangeValue - effective[cfg.target]) * cfg.depth;
      });

      Object.keys(controlDefs).forEach(id => {
        const def = controlDefs[id];

        effective[id] = clamp(effective[id], def.min, def.max);

        if (def.stepped) {
          effective[id] = Math.round(effective[id]);
        }
      });

      return effective;
    }

    function extractAudioParams(controls) {
      const params = {};
      knobIds.forEach(id => {
        params[id] = controls[id];
      });
      return params;
    }

    function applyAudioParams(params, controls) {
      if (!engine.context) return;

      const now = engine.context.currentTime;

      if (engine.filter) {
        engine.filter.frequency.setTargetAtTime(params.filter, now, 0.02);
      }

      if (engine.wetGain) {
        engine.wetGain.gain.setTargetAtTime(params.wet, now, 0.02);
      }

      if (engine.dryGain) {
        engine.dryGain.gain.setTargetAtTime(params.dry, now, 0.02);
      }

      if (engine.reverbInput) {
        engine.reverbInput.gain.setTargetAtTime(params.reverb * 0.65, now, 0.04);
      }

      if (engine.processedBus) {
        engine.processedBus.gain.setTargetAtTime(0.92 * controls.wetBoost, now, 0.02);
      }

      if (engine.rightDelay) {
        const delaySeconds = controls.phase * MAX_PHASE_DELAY_MS / 1000;
        engine.rightDelay.delayTime.setTargetAtTime(delaySeconds, now, 0.02);
      }
    }

    function makeImpulse(context, seconds = 2.2, decay = 4.2) {
      const length = Math.floor(context.sampleRate * seconds);
      const impulse = context.createBuffer(2, length, context.sampleRate);

      for (let c = 0; c < 2; c++) {
        const data = impulse.getChannelData(c);

        for (let i = 0; i < length; i++) {
          const t = i / length;
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
        }
      }

      return impulse;
    }

    function setupMosaicMemory(sampleRate) {
      engine.bufferLength = Math.floor(sampleRate * 8);
      engine.left = new Float32Array(engine.bufferLength);
      engine.right = new Float32Array(engine.bufferLength);
      engine.writeIndex = 0;
      engine.voices = [];
      engine.spawnCountdown = 0;
    }

    function spawnVoice(sampleRate) {
      const p = engine.currentParams || extractAudioParams(manualValues);
      const activity = clamp(p.activity, 0, 1);
      const loopBase = Math.max(24, Math.floor(sampleRate * p.time / 1000));
      const jitter = clamp(p.jitter, 0, 1);

      const lengthJitter = 1 + (Math.random() * 2 - 1) * jitter * 0.42;
      const loopLength = Math.max(32, Math.floor(loopBase * lengthJitter));
      const maxLookback = loopLength * (1.1 + jitter * 2.6);
      const offset = Math.floor(loopLength + Math.random() * maxLookback);
      const start = (engine.writeIndex - offset + engine.bufferLength) % engine.bufferLength;

      const interval = getArpInterval(engine.arpMode, 0);
      const pan = Math.random() * 2 - 1;
      const amp = 0.42 + Math.random() * 0.25;
      const cycles = 1.5 + p.repeats * 8.5;
      const life = Math.floor((loopLength / 2) * cycles);

      engine.voices.push({
        start,
        pos: 0,
        length: loopLength,
        age: 0,
        life,
        pan,
        amp,
        repeatIndex: 0,
        interval,
        rate: semitonesToRate(interval)
      });
    }

    function readCircular(buffer, position) {
      const i0 = Math.floor(position) % engine.bufferLength;
      const i1 = (i0 + 1) % engine.bufferLength;
      const frac = position - Math.floor(position);

      return buffer[i0] * (1 - frac) + buffer[i1] * frac;
    }

    function processMosaic(event) {
      const inputBuffer = event.inputBuffer;
      const outputBuffer = event.outputBuffer;

      const inputL = inputBuffer.getChannelData(0);
      const inputR = inputBuffer.numberOfChannels > 1 ? inputBuffer.getChannelData(1) : inputL;

      const outputL = outputBuffer.getChannelData(0);
      const outputR = outputBuffer.numberOfChannels > 1 ? outputBuffer.getChannelData(1) : outputL;

      const sampleRate = engine.context.sampleRate;
      const p = engine.currentParams || extractAudioParams(manualValues);

      const activity = clamp(p.activity, 0, 1);
      const loopSamples = Math.max(24, Math.floor(sampleRate * p.time / 1000));
      const maxVoices = 2 + Math.floor(activity * 18);
      const spawnInterval = Math.max(20, Math.floor(loopSamples * (1.75 - activity * 1.42)));

      let peak = 0;

      for (let i = 0; i < outputL.length; i++) {
        const dryL = inputL[i] || 0;
        const dryR = inputR[i] || dryL;

        peak = Math.max(peak, Math.abs(dryL), Math.abs(dryR));

        engine.left[engine.writeIndex] = dryL;
        engine.right[engine.writeIndex] = dryR;

        engine.spawnCountdown--;

        if (engine.spawnCountdown <= 0) {
          if (engine.voices.length < maxVoices && Math.random() < 0.68 + activity * 0.28) {
            spawnVoice(sampleRate);
          }

          engine.spawnCountdown = Math.floor(spawnInterval * (0.68 + Math.random() * 0.72));
        }

        let wetL = 0;
        let wetR = 0;
        const survivors = [];

        for (const voice of engine.voices) {
          const position = (voice.start + voice.pos) % engine.bufferLength;
          const sampleL = readCircular(engine.left, position);
          const sampleR = readCircular(engine.right, position);

          const attack = Math.min(384, voice.life * 0.12);
          const releaseStart = voice.life * 0.72;

          let env = 1;

          if (voice.age < attack) {
            env = voice.age / Math.max(1, attack);
          }

          if (voice.age > releaseStart) {
            env *= Math.max(
              0,
              1 - (voice.age - releaseStart) / Math.max(1, voice.life - releaseStart)
            );
          }

          const panL = Math.cos((voice.pan + 1) * Math.PI / 4);
          const panR = Math.sin((voice.pan + 1) * Math.PI / 4);
          const level = voice.amp * env;

          wetL += (sampleL * 0.82 + sampleR * 0.18) * level * panL;
          wetR += (sampleR * 0.82 + sampleL * 0.18) * level * panR;

          voice.pos += voice.rate;

          while (voice.pos >= voice.length) {
            voice.pos -= voice.length;
            voice.repeatIndex++;
            voice.interval = getArpInterval(engine.arpMode, voice.repeatIndex);
            voice.rate = semitonesToRate(voice.interval);
          }

          voice.age++;

          if (voice.age < voice.life) {
            survivors.push(voice);
          }
        }

        engine.voices = survivors;

        const normalize = 1 / Math.sqrt(Math.max(1, engine.voices.length * 0.75));

        outputL[i] = Math.tanh(wetL * normalize * 1.55);
        outputR[i] = Math.tanh(wetR * normalize * 1.55);

        engine.writeIndex = (engine.writeIndex + 1) % engine.bufferLength;
      }

      engine.inputPeak = peak;
      ui.readInput.textContent = `Input ${String(Math.round(peak * 100)).padStart(3, "0")}%`;
      ui.readVoices.textContent = `Voices ${String(engine.voices.length).padStart(2, "0")}`;
    }

    async function populateMicrophones() {
      if (!navigator.mediaDevices?.enumerateDevices) return;

      const devices = await navigator.mediaDevices.enumerateDevices();
      const inputs = devices.filter(d => d.kind === "audioinput");
      const current = ui.micSelect.value;

      ui.micSelect.innerHTML = `<option value="">Default microphone</option>`;

      inputs.forEach((device, index) => {
        const opt = document.createElement("option");
        opt.value = device.deviceId;
        opt.textContent = device.label || `Microphone ${index + 1}`;
        ui.micSelect.appendChild(opt);
      });

      if (current) {
        ui.micSelect.value = current;
      }
    }

    function getAudioConstraints() {
      const deviceId = ui.micSelect.value;

      const base = {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      };

      if (deviceId) {
        return { audio: { ...base, deviceId: { exact: deviceId } } };
      }

      return { audio: base };
    }

    async function stopAudio() {
      if (engine.stream) {
        engine.stream.getTracks().forEach(track => track.stop());
      }

      if (engine.processor) engine.processor.disconnect();
      if (engine.source) engine.source.disconnect();
      if (engine.context) await engine.context.close();

      engine.context = null;
      engine.stream = null;
      engine.source = null;
      engine.processor = null;
      engine.leftAnalyser = null;
      engine.rightAnalyser = null;
      engine.rightDelay = null;
      engine.filter = null;
      engine.wetGain = null;
      engine.dryGain = null;
      engine.reverbInput = null;
      engine.processedBus = null;
      engine.active = false;

      ui.startButton.textContent = "Input";
      setStatus("Stopped");
      ui.readInput.textContent = "Input 000%";
      ui.readVoices.textContent = "Voices 00";
    }

    async function startAudio() {
      if (engine.active) {
        await stopAudio();
        return;
      }

      try {
        setStatus("Requesting microphone");

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error("Microphone access is not available here");
        }

        if (!AudioContextClass) {
          throw new Error("Web Audio is not supported");
        }

        const context = new AudioContextClass({ latencyHint: "interactive" });

        if (context.state === "suspended") {
          await context.resume();
        }

        const stream = await navigator.mediaDevices.getUserMedia(getAudioConstraints());
        await populateMicrophones();

        const source = context.createMediaStreamSource(stream);
        const processor = context.createScriptProcessor(1024, 2, 2);
        processor.onaudioprocess = processMosaic;

        setupMosaicMemory(context.sampleRate);

        const filter = context.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = manualValues.filter;
        filter.Q.value = 0.62;

        const wetGain = context.createGain();
        wetGain.gain.value = manualValues.wet;

        const dryGain = context.createGain();
        dryGain.gain.value = manualValues.dry;

        const reverbInput = context.createGain();
        reverbInput.gain.value = manualValues.reverb * 0.65;

        const convolver = context.createConvolver();
        convolver.buffer = makeImpulse(context);

        const reverbReturn = context.createGain();
        reverbReturn.gain.value = 0.72;

        const processedBus = context.createGain();
        processedBus.gain.value = 0.92 * manualValues.wetBoost;

        const masterGain = context.createGain();
        masterGain.gain.value = 0.84;

        const phaseInput = context.createGain();
        phaseInput.channelCount = 2;
        phaseInput.channelCountMode = "explicit";
        phaseInput.channelInterpretation = "speakers";

        const phaseSplitter = context.createChannelSplitter(2);
        const leftPhaseGain = context.createGain();
        const rightDelay = context.createDelay(MAX_PHASE_DELAY_MS / 1000);
        rightDelay.delayTime.value = (manualValues.phase || 0) * MAX_PHASE_DELAY_MS / 1000;

        const phaseMerger = context.createChannelMerger(2);

        const leftAnalyser = context.createAnalyser();
        leftAnalyser.fftSize = 2048;
        leftAnalyser.smoothingTimeConstant = 0.72;

        const rightAnalyser = context.createAnalyser();
        rightAnalyser.fftSize = 2048;
        rightAnalyser.smoothingTimeConstant = 0.72;

        source.connect(processor);
        processor.connect(wetGain);
        wetGain.connect(filter);

        filter.connect(processedBus);
        filter.connect(reverbInput);

        reverbInput.connect(convolver);
        convolver.connect(reverbReturn);
        reverbReturn.connect(processedBus);

        processedBus.connect(phaseInput);

        source.connect(dryGain);
        dryGain.connect(phaseInput);

        phaseInput.connect(phaseSplitter);
        phaseSplitter.connect(leftPhaseGain, 0);
        phaseSplitter.connect(rightDelay, 1);

        leftPhaseGain.connect(leftAnalyser);
        rightDelay.connect(rightAnalyser);

        leftPhaseGain.connect(phaseMerger, 0, 0);
        rightDelay.connect(phaseMerger, 0, 1);

        phaseMerger.connect(masterGain);
        masterGain.connect(context.destination);

        engine.context = context;
        engine.stream = stream;
        engine.source = source;
        engine.processor = processor;
        engine.leftAnalyser = leftAnalyser;
        engine.rightAnalyser = rightAnalyser;
        engine.rightDelay = rightDelay;
        engine.filter = filter;
        engine.wetGain = wetGain;
        engine.dryGain = dryGain;
        engine.reverbInput = reverbInput;
        engine.processedBus = processedBus;
        engine.active = true;

        ui.startButton.textContent = "Stop";
        setStatus("Audio running");
      } catch (error) {
        console.error(error);
        ui.startButton.textContent = "Input Error";
        setStatus(`Error: ${error.message}`);
      }
    }

    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * dpr));
      const height = Math.max(1, Math.floor(rect.height * dpr));

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      return { width, height };
    }

    function drawMainScope() {
      const canvas = ui.scope;
      const ctx = canvas.getContext("2d");
      const { width, height } = resizeCanvas(canvas);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#07100c";
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.strokeStyle = "rgba(151, 180, 162, 0.16)";
      ctx.lineWidth = 1;

      const step = Math.max(32, width / 12);

      for (let x = 0; x <= width; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }

      for (let y = 0; y <= height; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(224, 236, 230, 0.20)";

      ctx.beginPath();
      ctx.moveTo(0, height / 2);
      ctx.lineTo(width, height / 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(width / 2, 0);
      ctx.lineTo(width / 2, height);
      ctx.stroke();

      ctx.restore();

      const hasLeft = !!engine.leftAnalyser;
      const hasRight = !!engine.rightAnalyser;

      if (hasLeft || hasRight) {
        if (hasLeft) {
          const leftData = new Uint8Array(engine.leftAnalyser.fftSize);
          engine.leftAnalyser.getByteTimeDomainData(leftData);

          ctx.save();
          ctx.lineWidth = Math.max(1.8, width / 420);
          ctx.strokeStyle = "rgba(201, 61, 103, 0.95)";
          ctx.shadowColor = "rgba(165, 31, 70, 0.66)";
          ctx.shadowBlur = 10;
          ctx.beginPath();

          const sliceX = width / (leftData.length - 1);

          for (let i = 0; i < leftData.length; i++) {
            const x = i * sliceX;
            const normalized = (leftData[i] - 128) / 128;
            const y = height / 2 + normalized * height * 0.28;

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }

          ctx.stroke();
          ctx.restore();
        }

        if (hasRight) {
          const rightData = new Uint8Array(engine.rightAnalyser.fftSize);
          engine.rightAnalyser.getByteTimeDomainData(rightData);

          ctx.save();
          ctx.lineWidth = Math.max(2, width / 360);
          ctx.strokeStyle = "#6d112d";
          ctx.shadowColor = "rgba(165, 31, 70, 0.92)";
          ctx.shadowBlur = 18;
          ctx.beginPath();

          const sliceY = height / (rightData.length - 1);

          for (let i = 0; i < rightData.length; i++) {
            const y = i * sliceY;
            const normalized = (rightData[i] - 128) / 128;
            const x = width / 2 + normalized * width * 0.28;

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }

          ctx.stroke();

          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(255, 196, 212, 0.42)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.restore();
        }
      } else {
        ctx.save();
        ctx.fillStyle = "rgba(224, 236, 230, 0.34)";
        ctx.font = `${Math.max(12, width / 42)}px SFMono-Regular, Consolas, monospace`;
        ctx.textAlign = "center";
        ctx.fillText("Standby", width / 2, height / 2);
        ctx.restore();
      }
    }

    function pseudoRandom(n) {
      const x = Math.sin(n * 127.1) * 43758.5453123;
      return (x - Math.floor(x)) * 2 - 1;
    }

    function waveformValueForDisplay(wave, phase, t) {
      const angle = phase + t * Math.PI * 2 * 1.2;

      if (wave === "sine") return Math.sin(angle);
      if (wave === "triangle") return (2 / Math.PI) * Math.asin(Math.sin(angle));
      if (wave === "square") return Math.sin(angle) >= 0 ? 1 : -1;
      if (wave === "random") return pseudoRandom(Math.floor((phase / (Math.PI * 2)) + t * 9));

      return Math.sin(angle);
    }

    function drawLfoScope(canvas, config, runtime) {
      const ctx = canvas.getContext("2d");
      const { width, height } = resizeCanvas(canvas);
      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.min(width, height) / 2 - 4;

      ctx.clearRect(0, 0, width, height);

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.clip();

      ctx.fillStyle = "#07100c";
      ctx.fillRect(0, 0, width, height);

      const rg = ctx.createRadialGradient(cx, cy, radius * 0.12, cx, cy, radius);
      rg.addColorStop(0, "rgba(35, 88, 55, 0.18)");
      rg.addColorStop(1, "rgba(7, 16, 12, 0)");
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "rgba(151, 180, 162, 0.14)";
      ctx.lineWidth = 1;

      for (let i = -2; i <= 2; i++) {
        const x = cx + i * radius * 0.4;
        ctx.beginPath();
        ctx.moveTo(x, cy - radius);
        ctx.lineTo(x, cy + radius);
        ctx.stroke();
      }

      for (let i = -2; i <= 2; i++) {
        const y = cy + i * radius * 0.4;
        ctx.beginPath();
        ctx.moveTo(cx - radius, y);
        ctx.lineTo(cx + radius, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(224, 236, 230, 0.18)";
      ctx.beginPath();
      ctx.moveTo(cx - radius, cy);
      ctx.lineTo(cx + radius, cy);
      ctx.stroke();

      const xStart = cx - radius * 0.82;
      const xEnd = cx + radius * 0.82;
      const amp = radius * 0.34;
      const points = 120;

      ctx.save();
      ctx.strokeStyle = config.enabled ? "#6d112d" : "rgba(109, 17, 45, 0.50)";
      ctx.lineWidth = 2;
      ctx.shadowColor = config.enabled ? "rgba(165, 31, 70, 0.85)" : "rgba(109, 17, 45, 0.35)";
      ctx.shadowBlur = 8;
      ctx.beginPath();

      for (let i = 0; i <= points; i++) {
        const t = i / points;
        const x = xStart + (xEnd - xStart) * t;
        const v = waveformValueForDisplay(config.wave, runtime.phase, t);
        const y = cy + v * amp;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = config.enabled ? "rgba(255, 196, 212, 0.44)" : "rgba(255, 196, 212, 0.18)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = "rgba(232, 240, 236, 0.18)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(cx, cy, radius - 1, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function renderFrame(now) {
      const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
      lastFrameTime = now;

      const controls = computeEffectiveControls(dt);
      const params = extractAudioParams(controls);

      engine.currentParams = params;
      engine.arpMode = Math.round(controls.arpMode);

      updateAllControlVisuals(controls, true);
      updateLfoLabels();
      applyAudioParams(params, controls);

      drawMainScope();
      drawLfoScope(ui.lfo1Scope, getLfoConfig(1), lfoRuntime.lfo1);
      drawLfoScope(ui.lfo2Scope, getLfoConfig(2), lfoRuntime.lfo2);

      requestAnimationFrame(renderFrame);
    }

    function bindKnobDrag(button) {
      const id = button.dataset.for;
      const input = ui[id];

      let dragging = false;
      let startY = 0;
      let startValue = 0;

      button.addEventListener("pointerdown", event => {
        dragging = true;
        startY = event.clientY;
        startValue = manualValues[id];
        button.setPointerCapture(event.pointerId);
        button.style.cursor = "grabbing";
      });

      button.addEventListener("pointermove", event => {
        if (!dragging) return;

        const min = Number(input.min);
        const max = Number(input.max);
        const delta = (startY - event.clientY) / 140;
        const next = clamp(startValue + delta * (max - min), min, max);

        manualValues[id] = next;
        input.value = next;
        setKnobVisual(id, next, false);
      });

      button.addEventListener("pointerup", event => {
        dragging = false;
        button.releasePointerCapture(event.pointerId);
        button.style.cursor = "grab";
      });
    }

    Object.keys(controlDefs).forEach(id => {
      ui[id].addEventListener("input", event => {
        if (event.isTrusted) {
          manualValues[id] = Number(ui[id].value);
        }
      });
    });

    [
      ui.lfo1Rate,
      ui.lfo1Depth,
      ui.lfo2Rate,
      ui.lfo2Depth,
      ui.lfo1Wave,
      ui.lfo2Wave,
      ui.lfo1Target,
      ui.lfo2Target,
      ui.lfo1Enable,
      ui.lfo2Enable
    ].forEach(el => {
      el.addEventListener("input", updateLfoLabels);
      el.addEventListener("change", updateLfoLabels);
    });

    document.querySelectorAll(".knob").forEach(bindKnobDrag);

    ui.startButton.addEventListener("click", startAudio);

    ui.micSelect.addEventListener("change", async () => {
      if (engine.active) {
        await stopAudio();
        await startAudio();
      }
    });

    if (navigator.mediaDevices?.addEventListener) {
      navigator.mediaDevices.addEventListener("devicechange", () => {
        populateMicrophones().catch(() => {});
      });
    }

    populateTargetSelects();
    ui.lfo1Target.value = "filter";
    ui.lfo2Target.value = "arpMode";
    syncManualValues();
    updateAllControlVisuals(manualValues, true);
    updateLfoLabels();
    populateMicrophones().catch(() => {});
    requestAnimationFrame(renderFrame);
  </script>
</body>
</html>
